function splitBubbleLines(text, maxLen = 36, maxLines = 3){
  const src = String(text || '').trim();
  if(!src) return [];
  const words = src.split(/\s+/);
  const lines = [];
  let current = '';
  for(const word of words){
    const next = current ? `${current} ${word}` : word;
    if(next.length <= maxLen){
      current = next;
    } else {
      if(current) lines.push(current);
      current = word;
      if(lines.length >= maxLines - 1) break;
    }
  }
  if(current && lines.length < maxLines) lines.push(current);
  if(lines.length === maxLines && src.length > lines.join(' ').length){
    lines[maxLines - 1] = lines[maxLines - 1].slice(0, Math.max(0, maxLen - 1)) + '…';
  }
  return lines;
}

function roundRectCanvas(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function refreshAgentInfoLabel(am){
  if(!am || !am._labelCanvas || !am._labelTexture || !am.data) return;
  const d = am.data;
  const taskText = String(d.current_task || '').slice(0, 80);
  const key = `${d.emoji||''}|${d.name||d.id}|${d.role||''}|${d.active?'1':'0'}|${d.current_skill||''}|${taskText}|${(d.skills||[]).length}`;
  if(key === am._labelKey) return;
  am._labelKey = key;

  const c = am._labelCanvas;
  const ctx = c.getContext('2d');
  ctx.clearRect(0, 0, c.width, c.height);

  const isActive = !!d.active;
  const skills = (d.skills || []).slice(0, 3).map(s => s.name).filter(Boolean);
  const bg = ctx.createLinearGradient(0, 0, c.width, c.height);
  bg.addColorStop(0, isActive ? 'rgba(4,30,18,0.95)' : 'rgba(50,12,18,0.95)');
  bg.addColorStop(1, isActive ? 'rgba(7,55,30,0.90)' : 'rgba(85,20,28,0.90)');
  const frame = isActive ? '#22c55e' : '#ef4444';
  const roleColor = isActive ? '#a7f3d0' : '#fecaca';
  const bodyColor = isActive ? '#dcfce7' : '#fee2e2';
  const dimColor = isActive ? '#86efac' : '#fca5a5';

  roundRectCanvas(ctx, 4, 4, c.width - 8, c.height - 8, 16);
  ctx.fillStyle = bg;
  ctx.fill();

  ctx.strokeStyle = frame;
  ctx.lineWidth = 2;
  roundRectCanvas(ctx, 4, 4, c.width - 8, c.height - 8, 16);
  ctx.stroke();

  ctx.fillStyle = frame;
  ctx.beginPath();
  ctx.arc(c.width - 22, 26, 7, 0, Math.PI * 2);
  ctx.fill();

  const emoji = String(d.emoji || 'A');
  const name = String(d.name || d.id || 'agent').slice(0, 16);
  ctx.font = 'bold 22px Arial';
  ctx.fillStyle = '#f8fafc';
  ctx.fillText(`${emoji} ${name}`, 14, 38);

  ctx.font = '13px Arial';
  ctx.fillStyle = roleColor;
  ctx.fillText(String(d.role || 'Agent').slice(0, 32), 14, 60);

  ctx.font = 'bold 12px Arial';
  ctx.fillStyle = isActive ? '#4ade80' : '#f87171';
  ctx.fillText(isActive ? 'WORKING' : 'IDLE', c.width - 90, 60);

  ctx.strokeStyle = isActive ? '#14532d' : '#7f1d1d';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(14, 72);
  ctx.lineTo(c.width - 14, 72);
  ctx.stroke();

  const sections = [];
  if(taskText) sections.push({label: 'TASK', value: taskText, lines: 3});
  if(d.current_skill) sections.push({label: 'SKILL', value: String(d.current_skill).slice(0, 40), lines: 2});
  if(skills.length) sections.push({label: 'SKILLS', value: skills.join(', '), lines: 2});
  if(!sections.length) sections.push({label: 'STATE', value: isActive ? 'Running workflow' : 'Waiting for work', lines: 2});

  let y = 92;
  for(let i = 0; i < sections.length; i++){
    const section = sections[i];
    ctx.font = 'bold 11px Arial';
    ctx.fillStyle = frame;
    ctx.fillText(section.label, 14, y);
    y += 15;

    const lines = splitBubbleLines(section.value, 42, section.lines);
    ctx.font = '12px Arial';
    ctx.fillStyle = bodyColor;
    for(const line of lines){
      ctx.fillText(line, 18, y);
      y += 15;
    }

    if(i < sections.length - 1){
      ctx.fillStyle = isActive ? 'rgba(34,197,94,0.16)' : 'rgba(239,68,68,0.16)';
      ctx.fillRect(14, y - 4, c.width - 28, 1);
      y += 10;
    }
  }

  if(isActive){
    const sx = (Date.now() / 10) % (c.width + 140) - 70;
    const shimmer = ctx.createLinearGradient(sx, 0, sx + 140, 0);
    shimmer.addColorStop(0, 'rgba(255,255,255,0)');
    shimmer.addColorStop(0.5, 'rgba(255,255,255,0.12)');
    shimmer.addColorStop(1, 'rgba(255,255,255,0)');
    roundRectCanvas(ctx, 4, 4, c.width - 8, c.height - 8, 16);
    ctx.fillStyle = shimmer;
    ctx.fill();
  }

  const lastActive = String(d.last_active || '').slice(0, 22);
  if(lastActive){
    ctx.font = '11px Arial';
    ctx.fillStyle = dimColor;
    ctx.fillText(lastActive, 14, c.height - 16);
  }

  am._labelTexture.needsUpdate = true;
}

function updateAgentLabelVisibility(){
  for(const id in agentMeshes){
    const am = agentMeshes[id];
    const label = agentInfoLabels[id];
    if(!am || !label) continue;
    label.visible = !!am.data?.active || hoveredAgentId === id;
  }
}

function updateAgentInfoLabelEffects(delta = 0.016){
  const t = Date.now() * 0.001;
  for(const id in agentMeshes){
    const am = agentMeshes[id];
    const label = agentInfoLabels[id];
    if(!am || !label) continue;
    const isActive = !!am.data?.active;
    const isHovered = hoveredAgentId === id;
    label.visible = isActive || isHovered;
    if(!label.visible) continue;
    if(isActive){
      am._labelKey = '';
      refreshAgentInfoLabel(am);
      const bob = Math.sin(t * 2.6 + id.length) * 0.06;
      const pulse = 1 + Math.sin(t * 3.2 + id.length) * 0.04;
      label.position.y = 2.78 + bob;
      label.scale.set(2.4 * pulse, 0.9 * pulse, 1);
      label.material.opacity = 0.98;
    } else {
      label.position.y = 2.75;
      label.scale.set(isHovered ? 2.45 : 2.4, isHovered ? 0.92 : 0.9, 1);
      label.material.opacity = isHovered ? 0.96 : 0.88;
    }
  }
}

function updateAgentSleepLabelEffects(delta = 0.016){
  const t = Date.now() * 0.001;
  for(const id in agentMeshes){
    const am = agentMeshes[id];
    const label = agentSleepLabels[id];
    if(!am || !label) continue;

    const anim = agentAnimations[id];
    const isAnimating = !!(anim && anim.state !== ANIMATION_STATES.IDLE);
    const isSleeping = !am.data?.active && !isAnimating;
    label.visible = isSleeping;
    if(!label.visible) continue;

    const drift = Math.sin(t * 1.6 + id.length) * 0.08;
    const sway = Math.cos(t * 1.8 + id.length) * 0.05;
    const pulse = 1 + Math.sin(t * 2.2 + id.length) * 0.06;
    label.position.set(0.48 + sway, 1.95 + drift, 0.26);
    label.scale.set(1.25 * pulse, 0.62 * pulse, 1);
    label.material.opacity = 0.82 + Math.sin(t * 2.1 + id.length) * 0.12;
  }
}

// Create floating skill particles for active agents
function createSkillParticles(agentId, mesh){
  // Remove existing particles
  removeSkillParticles(agentId);

  const particleCount = 8;
  const particles = [];

  for(let i = 0; i < particleCount; i++){
    const geo = new THREE.SphereGeometry(0.03, 6, 6);
    const mat = new THREE.MeshBasicMaterial({
      color: new THREE.Color().setHSL(Math.random(), 0.8, 0.6),
      transparent: true,
      opacity: 0.8
    });
    const particle = new THREE.Mesh(geo, mat);

    // Start position above the agent
    const angle = (i / particleCount) * Math.PI * 2;
    const radius = 0.3 + Math.random() * 0.2;
    particle.position.set(
      Math.cos(angle) * radius,
      1.8 + Math.random() * 0.3,
      Math.sin(angle) * radius
    );

    particle.userData = {
      velocity: new THREE.Vector3(
        (Math.random() - 0.5) * 0.002,
        0.005 + Math.random() * 0.01,
        (Math.random() - 0.5) * 0.002
      ),
      initialY: particle.position.y
    };

    mesh.add(particle);
    particles.push(particle);
  }

  skillParticles[agentId] = particles;
}

function updateSkillParticles(agentId, delta = 0.016){
  const particles = skillParticles[agentId];
  if(!particles) return;

  for(const particle of particles){
    // Scale velocity by delta (frame-rate independent)
    const scaledVelocity = particle.userData.velocity.clone().multiplyScalar(delta * 60);
    particle.position.add(scaledVelocity);

    // Fade out with delta time (0.3 per second at 60fps)
    particle.material.opacity -= 0.3 * delta;

    // Reset particle if it fades out
    if(particle.material.opacity <= 0){
      particle.position.y = particle.userData.initialY;
      particle.material.opacity = 0.8;
      // Random horizontal position
      const angle = Math.random() * Math.PI * 2;
      const radius = 0.3 + Math.random() * 0.2;
      particle.position.x = Math.cos(angle) * radius;
      particle.position.z = Math.sin(angle) * radius;
    }
  }
}

function removeSkillParticles(agentId){
  const particles = skillParticles[agentId];
  if(particles){
    const mesh = particles[0]?.parent;
    if(mesh){
      particles.forEach(p => mesh.remove(p));
    }
    delete skillParticles[agentId];
  }
}

// Raycasting for hover/click detection
function onPointerMove(event){
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  // Handle dragging
  if(isDragging && draggedObj){
    const intersects = raycaster.intersectObject(dragPlane);
    if(intersects.length > 0){
      const point = intersects[0].point;
      draggedObj.position.set(
        point.x - dragOffset.x,
        draggedObj.position.y,
        point.z - dragOffset.z
      );
      // Keep within bounds (open space - larger area)
      draggedObj.position.x = Math.max(-80, Math.min(80, draggedObj.position.x));
      draggedObj.position.z = Math.max(-80, Math.min(80, draggedObj.position.z));
    }
    document.body.style.cursor = 'grabbing';
    return;
  }

  // Check agent meshes
  const agentMeshList = Object.values(agentMeshes).map(am => am.mesh);
  const agentIntersects = raycaster.intersectObjects(agentMeshList, true);

  // Check furniture
  const furnIntersects = raycaster.intersectObjects(furnitureMeshes, true);

  const tooltip = document.getElementById('office-tooltip');
  hoveredAgentId = null;
  if(tooltip) tooltip.style.display = 'none';

  if(agentIntersects.length > 0){
    // Find which agent
    let obj = agentIntersects[0].object;
    while(obj.parent && !Object.values(agentMeshes).find(am => am.mesh === obj)){
      obj = obj.parent;
    }
    const agentData = Object.values(agentMeshes).find(am => am.mesh === obj);
    if(agentData){
      hoveredAgentId = agentData.data.id;
      updateAgentLabelVisibility();
      document.body.style.cursor = 'grab';
    }
  } else if(furnIntersects.length > 0){
    updateAgentLabelVisibility();
    const obj = furnIntersects[0].object;
    if(obj.userData && obj.userData.clickData){
      document.body.style.cursor = 'grab';
    } else {
      document.body.style.cursor = 'default';
    }
  } else {
    updateAgentLabelVisibility();
    document.body.style.cursor = 'default';
  }
}

// Drag & Drop handlers
function onPointerDown(event){
  if(event.button !== 0) return; // Only left click

  // Initialize dragOffset if needed
  if(!dragOffset && typeof THREE !== 'undefined'){
    dragOffset = new THREE.Vector3();
  }
  if(!dragOffset) return;

  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  // Check agents
  const agentMeshList = Object.values(agentMeshes).map(am => am.mesh);
  const agentIntersects = raycaster.intersectObjects(agentMeshList, true);

  if(agentIntersects.length > 0){
    let obj = agentIntersects[0].object;
    while(obj.parent && !Object.values(agentMeshes).find(am => am.mesh === obj)){
      obj = obj.parent;
    }
    const agentData = Object.values(agentMeshes).find(am => am.mesh === obj);
    if(agentData && obj.userData && obj.userData.draggable){
      isDragging = true;
      draggedObj = obj;
      controls.enabled = false;

      // Calculate offset
      const planeIntersects = raycaster.intersectObject(dragPlane);
      if(planeIntersects.length > 0){
        dragOffset.copy(planeIntersects[0].point).sub(obj.position);
      }

      // Show selection ring
      if(agentData.ring){
        agentData.ring.material.opacity = 0.6;
      }
      return;
    }
  }

  // Check furniture
  const furnIntersects = raycaster.intersectObjects(furnitureMeshes, true);
  if(furnIntersects.length > 0){
    const obj = furnIntersects[0].object;
    // Find parent group
    let group = obj;
    while(group.parent && !group.userData.draggable){
      group = group.parent;
    }
    if(group.userData && group.userData.draggable){
      isDragging = true;
      draggedObj = group;
      controls.enabled = false;

      const planeIntersects = raycaster.intersectObject(dragPlane);
      if(planeIntersects.length > 0){
        dragOffset.copy(planeIntersects[0].point).sub(group.position);
      }
      return;
    }
  }
}

function onPointerUp(event){
  if(isDragging && draggedObj){
    wasDragging = true;
    isDragging = false;

    // Hide selection rings
    Object.values(agentMeshes).forEach(am => {
      if(am.ring) am.ring.material.opacity = 0;
    });

    draggedObj = null;
    controls.enabled = true;

    // Reset wasDragging after a short delay
    setTimeout(() => { wasDragging = false; }, 100);
  }
}

// Camera preset views
function setCameraView(view){
  const duration = 500;
  const start = {
    x: camera.position.x,
    y: camera.position.y,
    z: camera.position.z,
    tx: controls.target.x,
    ty: controls.target.y,
    tz: controls.target.z
  };

  let end;
  switch(view){
    case 'top':
      end = {x: 0, y: 50, z: 0.1, tx: 0, ty: 0, tz: 0}; // Higher for larger area
      break;
    case 'side':
      end = {x: 40, y: 5, z: 0, tx: 0, ty: 1, tz: 0};
      break;
    case 'floor':
      end = {x: 0, y: 0.5, z: 30, tx: 0, ty: 1, tz: 0};
      break;
    case 'iso':
      end = {x: 25, y: 25, z: 25, tx: 0, ty: 1, tz: 0};
      break;
    case 'reset':
    default:
      end = {x: 0, y: 8, z: 20, tx: 0, ty: 1, tz: 0}; // Match initial camera
  }

  const startTime = Date.now();
  function animateCamera(){
    const elapsed = Date.now() - startTime;
    const t = Math.min(elapsed / duration, 1);
    const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

    camera.position.x = start.x + (end.x - start.x) * ease;
    camera.position.y = start.y + (end.y - start.y) * ease;
    camera.position.z = start.z + (end.z - start.z) * ease;
    controls.target.x = start.tx + (end.tx - start.tx) * ease;
    controls.target.y = start.ty + (end.ty - start.ty) * ease;
    controls.target.z = start.tz + (end.tz - start.tz) * ease;

    if(t < 1){
      requestAnimationFrame(animateCamera);
    }
  }
  animateCamera();
}

function onPointerClick(event){
  // Don't process click if we were dragging
  if(wasDragging){
    wasDragging = false;
    return;
  }

  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  // Interact with expanded thought panel first.
  if(activeThoughtPanel){
    if(activeThoughtPanel.mesh){
      const panelHit = raycaster.intersectObject(activeThoughtPanel.mesh, true);
      if(panelHit.length > 0){
        return;
      }
    }
    if(activeThoughtPanel.el && activeThoughtPanel.el.contains(event.target)){
      return;
    }
  }

  // Open thought panel when bubble is clicked.
  if(thoughtBubbles.length > 0){
    const bubbleIntersects = raycaster.intersectObjects(thoughtBubbles, true);
    if(bubbleIntersects.length > 0){
      let obj = bubbleIntersects[0].object;
      while(obj.parent && (!obj.userData || obj.userData.type !== 'thoughtBubble')){
        obj = obj.parent;
      }
      removeThoughtPanel();
      const bubbleAgentId = obj.userData?.agentId;
      if(bubbleAgentId && agentMeshes[bubbleAgentId]){
        // Close the clicked small bubble and open a larger detail panel.
        removeThoughtBubble(obj);
        const anim = agentAnimations[bubbleAgentId];
        if(anim) anim.thoughtBubble = null;
        activeThoughtPanel = createThoughtDetailPanel(agentMeshes[bubbleAgentId].data, bubbleAgentId);
      }
      return;
    }
  }

  const agentMeshList = Object.values(agentMeshes).map(am => am.mesh);
  const agentIntersects = raycaster.intersectObjects(agentMeshList, true);

  if(agentIntersects.length > 0){
    let obj = agentIntersects[0].object;
    while(obj.parent && !Object.values(agentMeshes).find(am => am.mesh === obj)){
      obj = obj.parent;
    }
    const agentData = Object.values(agentMeshes).find(am => am.mesh === obj);
    if(agentData){
      // Close panel and return current thinking agent before switching focus.
      if(activeThoughtPanel){
        closeThoughtForAgent(activeThoughtPanel.agentId, {startReturn: true});
        removeThoughtPanel();
      }

      // If another agent is thinking, send that one back to its own desk.
      for(const id in agentAnimations){
        const anim = agentAnimations[id];
        if(!anim || !anim.thoughtBubble) continue;
        if(anim.state === ANIMATION_STATES.SHOWING_THOUGHT && id !== agentData.data.id){
          closeThoughtForAgent(id, {startReturn: true});
        }
      }

      startAgentAnimationSequence(agentData);
      return;
    }
  }

  const furnIntersects = raycaster.intersectObjects(furnitureMeshes, true);
  if(furnIntersects.length > 0){
    let obj = furnIntersects[0].object;
    // Find parent group with userData
    while(obj.parent && !obj.userData.furnitureType){
      obj = obj.parent;
    }
    if(obj.userData && obj.userData.furnitureType){
      if(activeThoughtPanel){
        closeThoughtForAgent(activeThoughtPanel.agentId, {startReturn: true});
        removeThoughtPanel();
      }
      openCabinetDialog(obj.userData.furnitureType, null);
      return;
    }
  }

  // Empty area click: close panel and return thinking agent.
  if(activeThoughtPanel){
    closeThoughtForAgent(activeThoughtPanel.agentId, {startReturn: true});
    removeThoughtPanel();
  }
}

// ===== AGENT ANIMATION SEQUENCE =====
// When agent is clicked, stand up, walk to cabinet, work, show thought bubble, return

function startAgentAnimationSequence(agentData){
  const agentId = agentData.data.id;

  // Skip if already animating
  if(agentAnimations[agentId] && agentAnimations[agentId].state !== ANIMATION_STATES.IDLE){
    return;
  }

  // Store original seated position for return
  const originalPos = agentData.mesh.position.clone();
  const originalRot = agentData.mesh.rotation.y;

  // Find cabinet position (agent-specific, stand near it not inside)
  const cabinetPos = findAgentCabinetTarget(agentData);
  const routeTargets = buildCabinetRouteTargets(agentData, cabinetPos);

  // Initialize animation state
  agentAnimations[agentId] = {
    state: ANIMATION_STATES.STANDING_UP,
    originalPos: originalPos,
    originalRot: originalRot,
    startPos: agentData.mesh.position.clone(),
    targetPos: routeTargets.shift() || cabinetPos,
    routeTargets: routeTargets,
    agentData: agentData,
    walkProgress: 0,
    walkSpeed: 3,
    thoughtBubble: null,
    workTime: 0,
    thinkTime: 0,
    standTime: 0,
    sitTime: 0,
    shouldSitDown: true,
    blockedTime: 0,
    detourTarget: null
  };
}

function syncOfficeAgentAnimations(){
  if(!scene) return;
  for(const agentId in agentMeshes){
    const am = agentMeshes[agentId];
    if(!am || !am.data) continue;

    const isAnimating = !!(agentAnimations[agentId] && agentAnimations[agentId].state !== ANIMATION_STATES.IDLE);
    const isActive = !!am.data.active;

    if(isActive && !isAnimating){
      startAgentAnimationSequence(am);
      continue;
    }

    if(!isActive && isAnimating){
      const anim = agentAnimations[agentId];
      if(anim && anim.state !== ANIMATION_STATES.RETURNING && anim.state !== ANIMATION_STATES.SITTING_DOWN){
        sendAgentBackToDesk(agentId);
      }
    }
  }
}

function findAgentCabinetTarget(agentData){
  const deskPos = agentData?.desk?.position ? agentData.desk.position : null;
  const agentPos = deskPos || (agentData?.mesh?.position ? agentData.mesh.position : new THREE.Vector3(0, 0, 0));
  const agentId = agentData?.data?.id || '';

  const cabinets = [];
  for(const f of furnitureMeshes){
    if(!f || !f.userData || f.userData.furnitureType !== 'cabinet') continue;
    cabinets.push(f);
  }

  let nearest = null;
  let bestDist = Infinity;

  // Rule 1: Main agent only uses the manager-side cabinet (left side area).
  if(agentId === 'main'){
    const managerCabinets = cabinets.filter(c => c.position.x < 0);
    const pool = managerCabinets.length ? managerCabinets : cabinets;
    for(const c of pool){
      const d = agentPos.distanceTo(c.position);
      if(d < bestDist){
        bestDist = d;
        nearest = c.position.clone();
      }
    }
  } else {
    // Rule 2: Worker agents only use work-area front cabinets (right side, in front of desks).
    const deskZ = agentData?.desk?.position?.z ?? agentPos.z;
    const workerFrontCabinets = cabinets.filter(c => c.position.x >= 0 && c.position.z > deskZ + 1.0);
    const pool = workerFrontCabinets.length ? workerFrontCabinets : cabinets.filter(c => c.position.x >= 0);
    const finalPool = pool.length ? pool : cabinets;

    for(const c of finalPool){
      // Prefer cabinet closer on x-axis to this desk so each agent tends to its "own/front" cabinet.
      const xCost = Math.abs(c.position.x - (deskPos?.x ?? agentPos.x)) * 0.9;
      const d = agentPos.distanceTo(c.position) + xCost;
      if(d < bestDist){
        bestDist = d;
        nearest = c.position.clone();
      }
    }
  }

  if(!nearest){
    nearest = new THREE.Vector3(2, 0, 5);
  }

  const targetCabinet = cabinets.find(c => c.position.distanceTo(nearest) < 0.01) || null;
  if(!targetCabinet){
    return new THREE.Vector3(2, ROOT_Y.standing, 3.5);
  }

  return findCabinetApproachSlot(targetCabinet, agentData, deskPos || agentPos);
}

function findCabinetApproachSlot(cabinet, agentData, fallbackPos){
  const cabinetPos = cabinet.position.clone();
  const frontDir = new THREE.Vector3(0, 0, 1).applyQuaternion(cabinet.quaternion);
  frontDir.y = 0;
  if(frontDir.lengthSq() < 1e-4){
    frontDir.set(0, 0, -1);
  } else {
    frontDir.normalize();
  }

  const sideDir = new THREE.Vector3(-frontDir.z, 0, frontDir.x).normalize();
  const deskPos = agentData?.desk?.position ? agentData.desk.position.clone() : fallbackPos.clone();
  deskPos.y = 0;
  const agentId = String(agentData?.data?.id || '');
  const lateralHint = (deskPos.x - cabinetPos.x) * 0.38;
  const idSeed = Array.from(agentId).reduce((acc, ch) => acc + ch.charCodeAt(0), 0);
  const slotBias = ((idSeed % 3) - 1) * 0.12;
  const slotOffsets = [
    THREE.MathUtils.clamp(lateralHint + slotBias, -CABINET_SIDE_SLOT_SPACING, CABINET_SIDE_SLOT_SPACING),
    THREE.MathUtils.clamp(lateralHint + CABINET_SIDE_SLOT_SPACING + slotBias, -CABINET_SIDE_SLOT_SPACING * 1.45, CABINET_SIDE_SLOT_SPACING * 1.45),
    THREE.MathUtils.clamp(lateralHint - CABINET_SIDE_SLOT_SPACING + slotBias, -CABINET_SIDE_SLOT_SPACING * 1.45, CABINET_SIDE_SLOT_SPACING * 1.45),
    THREE.MathUtils.clamp(slotBias * 0.5, -0.3, 0.3)
  ];

  let best = null;
  let bestScore = Infinity;
  for(let i = 0; i < slotOffsets.length; i++){
    const laneDepth = i >= 2 ? CABINET_LANE_DEPTH : 0;
    const candidate = cabinetPos.clone()
      .add(frontDir.clone().multiplyScalar(CABINET_APPROACH_DISTANCE + laneDepth))
      .add(sideDir.clone().multiplyScalar(slotOffsets[i]));
    candidate.y = ROOT_Y.standing;

    if(isPointInsideObstacle(candidate, agentId, {ignoreOwnDesk: true, deskRadiusScale: 0.82})){
      continue;
    }

    const score = candidate.distanceTo(deskPos) + Math.abs(slotOffsets[i]) * 0.25 + laneDepth * 0.5;
    if(score < bestScore){
      best = candidate;
      bestScore = score;
    }
  }

  if(best){
    return best;
  }

  return cabinetPos.clone()
    .add(frontDir.multiplyScalar(CABINET_APPROACH_DISTANCE + CABINET_LANE_DEPTH))
    .setY(ROOT_Y.standing);
}

function chooseWorkerAisleX(fromX, toX){
  let best = WORKER_AISLE_XS[0];
  let bestScore = Infinity;
  for(const aisleX of WORKER_AISLE_XS){
    const score = Math.abs(aisleX - fromX) * 0.65 + Math.abs(aisleX - toX);
    if(score < bestScore){
      bestScore = score;
      best = aisleX;
    }
  }
  return best;
}

function pushRouteTarget(route, point){
  if(!point) return;
  point.y = ROOT_Y.standing;
  const last = route[route.length - 1];
  if(last && last.distanceTo(point) < 0.35) return;
  route.push(point);
}

function buildCabinetRouteTargets(agentData, finalTarget){
  if(!agentData || !finalTarget) return [];
  const agentId = String(agentData?.data?.id || '');
  if(agentId === 'main'){
    return [finalTarget.clone()];
  }

  const currentPos = agentData.mesh.position.clone();
  const deskPos = agentData?.desk?.position ? agentData.desk.position.clone() : currentPos.clone();
  const aisleX = chooseWorkerAisleX(deskPos.x, finalTarget.x);
  const route = [];

  pushRouteTarget(route, new THREE.Vector3(aisleX, ROOT_Y.standing, currentPos.z));
  pushRouteTarget(route, new THREE.Vector3(aisleX, ROOT_Y.standing, WORKER_FRONT_LANE_Z));
  pushRouteTarget(route, new THREE.Vector3(finalTarget.x, ROOT_Y.standing, WORKER_FRONT_LANE_Z));
  pushRouteTarget(route, finalTarget.clone());

  return route;
}

function buildDeskReturnRoute(agentData){
  if(!agentData) return [];
  const seatPos = getDeskSeatPosition(agentData) || agentData.mesh.position.clone();
  seatPos.y = ROOT_Y.standing;
  const agentId = String(agentData?.data?.id || '');
  if(agentId === 'main'){
    return [seatPos];
  }

  const currentPos = agentData.mesh.position.clone();
  const deskPos = agentData?.desk?.position ? agentData.desk.position.clone() : seatPos.clone();
  const aisleX = chooseWorkerAisleX(currentPos.x, deskPos.x);
  const route = [];

  pushRouteTarget(route, new THREE.Vector3(aisleX, ROOT_Y.standing, currentPos.z));
  pushRouteTarget(route, new THREE.Vector3(aisleX, ROOT_Y.standing, deskPos.z));
  pushRouteTarget(route, seatPos.clone());

  return route;
}

function advanceAnimationRoute(anim){
  if(!anim) return false;
  if(anim.routeTargets && anim.routeTargets.length){
    anim.targetPos = anim.routeTargets.shift();
    anim.detourTarget = null;
    anim.blockedTime = 0;
    return true;
  }
  return false;
}

function getDeskSeatPosition(agentData){
  if(!agentData || !agentData.desk) return null;
  // Chair center is at local z = -0.5 in createDesk().
  const seatLocal = new THREE.Vector3(0, 0, -0.5);
  return agentData.desk.localToWorld(seatLocal.clone());
}

function getDeskSidePosition(agentData){
  if(!agentData || !agentData.desk) return null;
  const deskPos = agentData.desk.position.clone();
  return new THREE.Vector3(deskPos.x + 1.1, 0, deskPos.z + 0.2);
}

function applySeatedPose(am){
  if(am.body) am.body.position.y = POSE.seatedBodyY;
  if(am.head) am.head.position.y = POSE.seatedHeadY;
  if(am.leftLeg && am.rightLeg){
    am.leftLeg.rotation.x = 1.2;
    am.rightLeg.rotation.x = 1.2;
  }
  if(am.leftArm && am.rightArm){
    am.leftArm.rotation.x = -0.8;
    am.rightArm.rotation.x = -0.8;
  }
}

function faceAgentToDeskMonitor(am){
  if(!am || !am.mesh || !am.monitor) return;
  const monitorWorld = new THREE.Vector3();
  am.monitor.getWorldPosition(monitorWorld);
  am.mesh.lookAt(monitorWorld.x, am.mesh.position.y, monitorWorld.z);
}

function applyProximityHeadLook(am, baseYaw, basePitch){
  if(!camera || !am || !am.mesh || !am.head){
    return {yaw: baseYaw, pitch: basePitch};
  }

  const headWorld = new THREE.Vector3();
  am.head.getWorldPosition(headWorld);
  const dist = headWorld.distanceTo(camera.position);
  // Lock head-follow in close zoom, unlock when zoomed out (hysteresis).
  const lockInDist = 3.6;
  const lockOutDist = 4.4;
  if(am.headFollowLocked){
    if(dist > lockOutDist){
      am.headFollowLocked = false;
    }
  } else if(dist < lockInDist){
    am.headFollowLocked = true;
  }
  if(!am.headFollowLocked){
    return {yaw: baseYaw, pitch: basePitch};
  }

  // Convert camera position to character-local space to compute yaw/pitch offsets.
  const camLocal = am.mesh.worldToLocal(camera.position.clone());
  const yawToCam = Math.atan2(camLocal.x, camLocal.z);
  const horiz = Math.sqrt(camLocal.x * camLocal.x + camLocal.z * camLocal.z) || 1e-6;
  const pitchToCam = Math.atan2(camLocal.y - am.head.position.y, horiz);

  const camYaw = THREE.MathUtils.clamp(yawToCam, -0.8, 0.8);
  const camPitch = THREE.MathUtils.clamp(pitchToCam, -0.28, 0.4);

  return {
    // Immediate switch to camera-follow while locked.
    yaw: camYaw,
    pitch: camPitch
  };
}

function snapAgentToDeskSeat(am){
  if(!am) return;
  const seatPos = getDeskSeatPosition(am);
  if(seatPos){
    seatPos.y = ROOT_Y.seated;
    am.mesh.position.copy(seatPos);
  }
  faceAgentToDeskMonitor(am);
  applySeatedPose(am);
}

function isPointInsideObstacle(point, movingAgentId, options = {}){
  const {ignoreOwnDesk = false, deskRadiusScale = 1} = options;
  // Desks
  for(const id in agentMeshes){
    const am = agentMeshes[id];
    if(!am || !am.desk) continue;
    if(ignoreOwnDesk && id === movingAgentId) continue;
    // Allow this agent to approach its own desk very closely.
    const r = (id === movingAgentId) ? 0.42 : AGENT_DESK_COLLISION_RADIUS * deskRadiusScale;
    if(point.distanceTo(am.desk.position) < r){
      return true;
    }
  }

  // Furniture
  for(const f of furnitureMeshes){
    if(!f || !f.position) continue;
    if(point.distanceTo(f.position) < AGENT_FURNITURE_COLLISION_RADIUS){
      return true;
    }
  }
  return false;
}

function getAgentSeparationVector(agentId, currentPos){
  const sep = new THREE.Vector3();
  for(const otherId in agentMeshes){
    if(otherId === agentId) continue;
    const other = agentMeshes[otherId];
    if(!other || !other.mesh) continue;
    const delta = new THREE.Vector3().subVectors(currentPos, other.mesh.position);
    delta.y = 0;
    const dist = delta.length();
    if(dist > 0 && dist < AGENT_COLLISION_RADIUS){
      const strength = (AGENT_COLLISION_RADIUS - dist) / AGENT_COLLISION_RADIUS;
      sep.add(delta.normalize().multiplyScalar(strength * AGENT_SEPARATION_WEIGHT));
    }
  }
  return sep;
}

function hasMovePriority(agentId, otherId){
  return String(agentId) <= String(otherId);
}

function isSecurityLikeAgent(anim){
  if(!anim || !anim.agentData || !anim.agentData.data) return false;
  const d = anim.agentData.data;
  const id = String(d.id || '').toLowerCase();
  const role = String(d.role || '').toLowerCase();
  return id.includes('security') || role.includes('security');
}

function findBlockingAgentPosition(agentId, fromPos, targetPos){
  const toTarget = new THREE.Vector3().subVectors(targetPos, fromPos);
  toTarget.y = 0;
  if(toTarget.lengthSq() < 1e-4) return null;
  toTarget.normalize();

  let best = null;
  let bestDist = Infinity;
  for(const otherId in agentMeshes){
    if(otherId === agentId) continue;
    const other = agentMeshes[otherId];
    if(!other || !other.mesh) continue;
    const toOther = new THREE.Vector3().subVectors(other.mesh.position, fromPos);
    toOther.y = 0;
    const dist = toOther.length();
    if(dist < 0.2 || dist > 3.2) continue;
    const dot = toTarget.dot(toOther.clone().normalize());
    if(dot < 0.2) continue; // only agents roughly in front

    // Perpendicular distance from forward ray
    const lateral = Math.abs(toTarget.x * toOther.z - toTarget.z * toOther.x);
    if(lateral > 1.0) continue;

    if(dist < bestDist){
      bestDist = dist;
      best = other.mesh.position.clone();
    }
  }
  return best;
}

function createDetourTarget(agentId, anim){
  const am = anim.agentData;
  const blockerPos = findBlockingAgentPosition(agentId, am.mesh.position, anim.targetPos);
  if(!blockerPos) return null;

  const forward = new THREE.Vector3().subVectors(anim.targetPos, am.mesh.position);
  forward.y = 0;
  if(forward.lengthSq() < 1e-4) return null;
  forward.normalize();
  const side = new THREE.Vector3(-forward.z, 0, forward.x).normalize();
  const candidates = [];
  const sideOffsets = isSecurityLikeAgent(anim) ? [1.6, 2.2, 2.8, 3.3] : [1.2, 1.8, 2.4];
  for(const s of sideOffsets){
    candidates.push(blockerPos.clone().add(side.clone().multiplyScalar(s)));
    candidates.push(blockerPos.clone().add(side.clone().multiplyScalar(-s)));
  }
  // Add forward/back variants for tight rows.
  candidates.push(blockerPos.clone().add(side.clone().multiplyScalar(1.8)).add(forward.clone().multiplyScalar(0.8)));
  candidates.push(blockerPos.clone().add(side.clone().multiplyScalar(-1.8)).add(forward.clone().multiplyScalar(0.8)));
  candidates.push(blockerPos.clone().add(side.clone().multiplyScalar(1.8)).add(forward.clone().multiplyScalar(-0.8)));
  candidates.push(blockerPos.clone().add(side.clone().multiplyScalar(-1.8)).add(forward.clone().multiplyScalar(-0.8)));

  let best = null;
  let bestScore = Infinity;
  for(const cand of candidates){
    cand.y = ROOT_Y.standing;
    const blocked = isPointInsideObstacle(cand, agentId, {ignoreOwnDesk: true, deskRadiusScale: isSecurityLikeAgent(anim) ? 0.8 : 0.9});
    if(blocked) continue;
    // Score: prefer closer to final target and less detour distance.
    const score = cand.distanceTo(anim.targetPos) + cand.distanceTo(am.mesh.position) * 0.45;
    if(score < bestScore){
      best = cand;
      bestScore = score;
    }
  }
  return best;
}

function findEmergencyUnstuckPoint(agentId, anim){
  const am = anim.agentData;
  const current = am.mesh.position.clone();
  const forward = new THREE.Vector3().subVectors(anim.targetPos, current);
  forward.y = 0;
  if(forward.lengthSq() < 1e-4) forward.set(0, 0, 1);
  forward.normalize();
  const side = new THREE.Vector3(-forward.z, 0, forward.x).normalize();

  // Spiral-like candidate sampling around current position.
  const radii = [1.1, 1.6, 2.1, 2.7, 3.3];
  const angles = [0, 25, -25, 45, -45, 70, -70, 100, -100, 135, -135];
  let best = null;
  let bestScore = Infinity;
  for(const r of radii){
    for(const a of angles){
      const rad = a * Math.PI / 180;
      const dir = forward.clone().multiplyScalar(Math.cos(rad)).add(side.clone().multiplyScalar(Math.sin(rad)));
      const cand = current.clone().add(dir.multiplyScalar(r));
      cand.y = ROOT_Y.standing;
      if(isPointInsideObstacle(cand, agentId, {ignoreOwnDesk: true, deskRadiusScale: 0.75})) continue;
      const score = cand.distanceTo(anim.targetPos) + cand.distanceTo(current) * 0.35;
      if(score < bestScore){
        bestScore = score;
        best = cand;
      }
    }
  }
  return best;
}

function applyAgentMovement(agentId, anim, delta, targetOverride = null){
  const am = anim.agentData;
  const target = targetOverride || anim.targetPos;
  const toTarget = new THREE.Vector3().subVectors(target, am.mesh.position);
  toTarget.y = 0;
  const distance = toTarget.length();
  if(distance < 0.5){
    return {arrived: true, distance: distance};
  }

  const baseDir = toTarget.clone().normalize();
  const separation = getAgentSeparationVector(agentId, am.mesh.position);
  let moveDir = baseDir.clone().add(separation);
  if(moveDir.lengthSq() < 1e-4){
    moveDir = baseDir;
  }
  moveDir.normalize();

  // Yield if another moving agent is too close and has priority.
  for(const otherId in agentAnimations){
    if(otherId === agentId) continue;
    const otherAnim = agentAnimations[otherId];
    if(!otherAnim || otherAnim.state === ANIMATION_STATES.IDLE) continue;
    const otherAm = otherAnim.agentData;
    if(!otherAm || !otherAm.mesh) continue;
    const d = am.mesh.position.distanceTo(otherAm.mesh.position);
    if(d < AGENT_COLLISION_RADIUS && !hasMovePriority(agentId, otherId)){
      return {arrived: false, distance: distance, blocked: true};
    }
  }

  // Clamp step to remaining distance to prevent overshoot/oscillation around target.
  const step = Math.min(anim.walkSpeed * delta, Math.max(distance - 0.02, 0));
  const currentPos = am.mesh.position.clone();
  const nextPos = currentPos.clone().add(moveDir.clone().multiplyScalar(step));

  // Prevent walking through desks/furniture.
  const ignoreOwnDesk = anim.state === ANIMATION_STATES.WALKING || anim.state === ANIMATION_STATES.RETURNING;
  const deskRadiusScale = ignoreOwnDesk ? (isSecurityLikeAgent(anim) ? 0.78 : 0.88) : 1;
  if(isPointInsideObstacle(nextPos, agentId, {ignoreOwnDesk, deskRadiusScale})){
    const sideA = new THREE.Vector3(-moveDir.z, 0, moveDir.x).normalize();
    const sideB = sideA.clone().multiplyScalar(-1);
    const altA = currentPos.clone().add(sideA.multiplyScalar(step));
    const altB = currentPos.clone().add(sideB.multiplyScalar(step));
    if(!isPointInsideObstacle(altA, agentId, {ignoreOwnDesk, deskRadiusScale})){
      am.mesh.position.copy(altA);
    } else if(!isPointInsideObstacle(altB, agentId, {ignoreOwnDesk, deskRadiusScale})){
      am.mesh.position.copy(altB);
    } else {
      return {arrived: false, distance: distance, blocked: true};
    }
  } else {
    am.mesh.position.copy(nextPos);
  }

  return {arrived: false, distance: distance, blocked: false};
}

function updateAgentAnimations(delta){
  const time = clock ? clock.getElapsedTime() : 0;

  for(const agentId in agentAnimations){
    const anim = agentAnimations[agentId];
    if(!anim || anim.state === ANIMATION_STATES.IDLE) continue;

    const am = anim.agentData;

    switch(anim.state){
      case ANIMATION_STATES.STANDING_UP:
        anim.standTime += delta;
        const standProgress = Math.min(anim.standTime / 0.5, 1); // 0.5s to stand up
        am.mesh.position.y = ROOT_Y.seated + (ROOT_Y.standing - ROOT_Y.seated) * standProgress;

        // Animate character from seated to standing.
        if(am.body){
          am.body.position.y = POSE.seatedBodyY + (POSE.standingBodyY - POSE.seatedBodyY) * standProgress;
        }

        if(am.head){
          am.head.position.y = POSE.seatedHeadY + (POSE.standingHeadY - POSE.seatedHeadY) * standProgress;
        }

        // Legs straighten
        if(am.leftLeg && am.rightLeg){
          am.leftLeg.rotation.x = (1 - standProgress) * Math.PI / 3;
          am.rightLeg.rotation.x = (1 - standProgress) * Math.PI / 3;
        }

        // Arms come down to sides
        if(am.leftArm && am.rightArm){
          am.leftArm.rotation.x = -(1 - standProgress) * Math.PI / 4;
          am.rightArm.rotation.x = -(1 - standProgress) * Math.PI / 4;
        }

        // Finished standing up
        if(standProgress >= 1){
          anim.state = ANIMATION_STATES.WALKING;
        }
        break;

      case ANIMATION_STATES.WALKING:
        {
        am.mesh.position.y = ROOT_Y.standing;
        const activeTarget = anim.detourTarget || anim.targetPos;
        const toTarget = new THREE.Vector3().subVectors(activeTarget, am.mesh.position);
        toTarget.y = 0;
        const distance = toTarget.length();
        if(distance > 0.1){
          am.mesh.lookAt(activeTarget.x, am.mesh.position.y, activeTarget.z);
        }

        if(distance < 0.5){
          if(anim.detourTarget){
            anim.detourTarget = null;
            anim.blockedTime = 0;
          } else if(advanceAnimationRoute(anim)){
            // Continue to the next route node.
          } else {
            // Arrived at cabinet
            anim.state = ANIMATION_STATES.WORKING_AT_CABINET;
            anim.workTime = 0;
          }
        } else {
          // Continue walking with separation/yielding
          const move = applyAgentMovement(agentId, anim, delta, activeTarget);
          if(move.blocked){
            anim.blockedTime = (anim.blockedTime || 0) + delta;
            if(!anim.detourTarget && anim.blockedTime > 0.22){
              anim.detourTarget = createDetourTarget(agentId, anim);
              anim.blockedTime = 0;
            } else if(anim.detourTarget && anim.blockedTime > 0.35){
              anim.detourTarget = createDetourTarget(agentId, anim) || null;
              anim.blockedTime = 0;
            } else if(!anim.detourTarget && anim.blockedTime > 0.85){
              anim.detourTarget = findEmergencyUnstuckPoint(agentId, anim) || null;
              anim.blockedTime = 0;
            }
          } else {
            anim.blockedTime = Math.max(0, (anim.blockedTime || 0) - delta * 2);
          }

          // Walking bob animation
          const walkBob = Math.abs(Math.sin(time * 10)) * 0.05;
          if(am.body) am.body.position.y = POSE.standingBodyY + walkBob;
          if(am.head) am.head.position.y = POSE.standingHeadY + walkBob;

          // Leg swing animation (if legs exist)
          if(am.leftLeg && am.rightLeg){
            am.leftLeg.rotation.x = Math.sin(time * 10) * 0.5;
            am.rightLeg.rotation.x = -Math.sin(time * 10) * 0.5;
          }

          // Arm swing animation
          if(am.leftArm && am.rightArm){
            am.leftArm.rotation.x = -Math.sin(time * 10) * 0.3;
            am.rightArm.rotation.x = Math.sin(time * 10) * 0.3;
          }
        }
        }
        break;

      case ANIMATION_STATES.WORKING_AT_CABINET:
        anim.workTime += delta;
        am.mesh.position.y = ROOT_Y.standing;

        // Working animation at cabinet - standing position
        if(am.body) am.body.rotation.z = Math.sin(time * 8) * 0.1;
        if(am.head) am.head.rotation.y = Math.sin(time * 4) * 0.2;

        // Arm movements (searching/working)
        if(am.leftArm && am.rightArm){
          am.leftArm.rotation.z = Math.sin(time * 6) * 0.3;
          am.rightArm.rotation.z = Math.cos(time * 6) * 0.3;
        }

        if(anim.isDelegation){
          // Delegation mode: show speech bubble, trigger target agent, then auto-return
          if(!anim.delegationTriggered && anim.workTime > 0.5){
            anim.delegationTriggered = true;
            if(SHOW_OFFICE_DETAIL_BUBBLES && anim.delegationMsg){
              anim.thoughtBubble = createSpeechBubble(anim.delegationMsg, am.mesh);
            }
            const targetAm = agentMeshes[anim.delegationTargetId];
            if(targetAm){
              targetAm.data.active = true;
              targetAm._labelKey = '';
              refreshAgentInfoLabel(targetAm);
              if(!agentAnimations[anim.delegationTargetId] ||
                 agentAnimations[anim.delegationTargetId].state === ANIMATION_STATES.IDLE){
                startAgentAnimationSequence(targetAm);
              }
            }
          }
          // Auto-return after 4 seconds of "talking"
          if(anim.workTime > 4){
            if(anim.thoughtBubble){ removeThoughtBubble(anim.thoughtBubble); anim.thoughtBubble = null; }
            anim.state = ANIMATION_STATES.RETURNING;
            const returnRoute = buildDeskReturnRoute(anim.agentData);
            anim.targetPos = returnRoute.shift() || getDeskSeatPosition(anim.agentData) || anim.originalPos.clone();
            anim.targetPos.y = ROOT_Y.standing;
            anim.routeTargets = returnRoute;
            anim.shouldSitDown = true;
          }
        } else {
          // After 2 seconds of working, either show detail bubble or return directly.
          if(anim.workTime > 2 && SHOW_OFFICE_DETAIL_BUBBLES){
            anim.state = ANIMATION_STATES.SHOWING_THOUGHT;
            anim.thoughtBubble = createThoughtBubble(am.data, am.mesh);
            anim.thinkTime = 0;
          } else if(anim.workTime > 2){
            anim.state = ANIMATION_STATES.RETURNING;
            const returnRoute = buildDeskReturnRoute(anim.agentData);
            anim.targetPos = returnRoute.shift() || getDeskSeatPosition(anim.agentData) || anim.originalPos.clone();
            anim.targetPos.y = ROOT_Y.standing;
            anim.routeTargets = returnRoute;
            anim.shouldSitDown = true;
          }
        }
        break;

      case ANIMATION_STATES.SHOWING_THOUGHT:
        anim.thinkTime += delta;
        am.mesh.position.y = ROOT_Y.standing;

        // Thinking/standing animation
        if(am.head){
          am.head.position.y = POSE.standingHeadY + Math.sin(time * 3) * 0.02;
          am.head.rotation.y = Math.sin(time * 2) * 0.1;
        }

        // Update thought bubble position (follow agent)
        if(anim.thoughtBubble){
          const bubblePos = am.mesh.position.clone();
          bubblePos.y += 2.8;
          bubblePos.z -= 0.5;
          anim.thoughtBubble.position.copy(bubblePos);
        }

        // Thought state remains until user closes bubble/panel.
        break;

      case ANIMATION_STATES.RETURNING:
        {
        am.mesh.position.y = ROOT_Y.standing;
        const activeTarget = anim.detourTarget || anim.targetPos;
        const returnDir = new THREE.Vector3().subVectors(activeTarget, am.mesh.position);
        returnDir.y = 0;
        const returnDist = returnDir.length();
        if(returnDist > 0.1){
          am.mesh.lookAt(activeTarget.x, am.mesh.position.y, activeTarget.z);
        }

        if(returnDist < 0.5){
          if(anim.detourTarget){
            anim.detourTarget = null;
            anim.blockedTime = 0;
          } else if(advanceAnimationRoute(anim)){
            // Continue to the next route node.
          } else {
            if(anim.shouldSitDown){
              // Arrived at desk, start sitting down
              anim.state = ANIMATION_STATES.SITTING_DOWN;
              anim.sitTime = 0;
            } else {
              // Arrived near target desk, remain standing
              if(am.body) am.body.position.y = POSE.standingBodyY;
              if(am.head) am.head.position.y = POSE.standingHeadY;
              if(am.leftLeg && am.rightLeg){
                am.leftLeg.rotation.x = 0;
                am.rightLeg.rotation.x = 0;
              }
              if(am.leftArm && am.rightArm){
                am.leftArm.rotation.x = 0;
                am.rightArm.rotation.x = 0;
              }
              agentAnimations[agentId] = null;
            }
          }
        } else {
          // Continue walking with separation/yielding
          const move = applyAgentMovement(agentId, anim, delta, activeTarget);
          if(move.blocked){
            anim.blockedTime = (anim.blockedTime || 0) + delta;
            if(!anim.detourTarget && anim.blockedTime > 0.22){
              anim.detourTarget = createDetourTarget(agentId, anim);
              anim.blockedTime = 0;
            } else if(anim.detourTarget && anim.blockedTime > 0.35){
              anim.detourTarget = createDetourTarget(agentId, anim) || null;
              anim.blockedTime = 0;
            } else if(!anim.detourTarget && anim.blockedTime > 0.85){
              anim.detourTarget = findEmergencyUnstuckPoint(agentId, anim) || null;
              anim.blockedTime = 0;
            }
          } else {
            anim.blockedTime = Math.max(0, (anim.blockedTime || 0) - delta * 2);
          }

          // Walking bob animation
          const returnBob = Math.abs(Math.sin(time * 10)) * 0.05;
          if(am.body) am.body.position.y = POSE.standingBodyY + returnBob;
          if(am.head) am.head.position.y = POSE.standingHeadY + returnBob;

          // Leg swing animation
          if(am.leftLeg && am.rightLeg){
            am.leftLeg.rotation.x = Math.sin(time * 10) * 0.5;
            am.rightLeg.rotation.x = -Math.sin(time * 10) * 0.5;
          }

          // Arm swing animation
          if(am.leftArm && am.rightArm){
            am.leftArm.rotation.x = -Math.sin(time * 10) * 0.3;
            am.rightArm.rotation.x = Math.sin(time * 10) * 0.3;
          }
        }
        }
        break;

      case ANIMATION_STATES.SITTING_DOWN:
        anim.sitTime += delta;
        const sitProgress = Math.min(anim.sitTime / 0.5, 1); // 0.5s to sit down
        am.mesh.position.y = ROOT_Y.standing + (ROOT_Y.seated - ROOT_Y.standing) * sitProgress;

        // Animate character from standing to seated position
        if(am.body){
          am.body.position.y = POSE.standingBodyY + (POSE.seatedBodyY - POSE.standingBodyY) * sitProgress;
        }

        if(am.head){
          am.head.position.y = POSE.standingHeadY + (POSE.seatedHeadY - POSE.standingHeadY) * sitProgress;
        }

        // Legs bend for sitting
        if(am.leftLeg && am.rightLeg){
          am.leftLeg.rotation.x = sitProgress * Math.PI / 3;
          am.rightLeg.rotation.x = sitProgress * Math.PI / 3;
        }

        // Arms come forward for typing position
        if(am.leftArm && am.rightArm){
          am.leftArm.rotation.x = -sitProgress * Math.PI / 4;
          am.rightArm.rotation.x = -sitProgress * Math.PI / 4;
        }

        // Finished sitting - restore original rotation and go to idle
        if(sitProgress >= 1){
          const seatPos = getDeskSeatPosition(am) || anim.originalPos;
          seatPos.y = ROOT_Y.seated;
          am.mesh.position.copy(seatPos);
          faceAgentToDeskMonitor(am);
          applySeatedPose(am);

          // Reset to idle animation state
          agentAnimations[agentId] = null;
        }
        break;
    }
  }
}

function removeThoughtBubble(mesh){
  if(!mesh) return;
  if(mesh.material && mesh.material.map) mesh.material.map.dispose();
  if(mesh.material) mesh.material.dispose();
  if(mesh.geometry) mesh.geometry.dispose();
  // Remove from parent (could be scene or agentMesh)
  if(mesh.parent) mesh.parent.remove(mesh);
  else scene.remove(mesh);
  thoughtBubbles = thoughtBubbles.filter(b => b !== mesh);
}

function removeThoughtPanel(){
  if(!activeThoughtPanel) return;
  const mesh = activeThoughtPanel.mesh;
  const el = activeThoughtPanel.el;
  if(mesh){
    if(mesh.material && mesh.material.map) mesh.material.map.dispose();
    if(mesh.material) mesh.material.dispose();
    if(mesh.geometry) mesh.geometry.dispose();
    scene.remove(mesh);
  }
  if(el && el.parentNode){
    el.parentNode.removeChild(el);
  }
  activeThoughtPanel = null;
}

function closeThoughtForAgent(agentId, options = {}){
  const {startReturn = true} = options;
  const anim = agentAnimations[agentId];
  if(!anim) return;
  if(anim.thoughtBubble){
    removeThoughtBubble(anim.thoughtBubble);
    anim.thoughtBubble = null;
  }
  if(startReturn){
    anim.state = ANIMATION_STATES.RETURNING;
    const returnRoute = buildDeskReturnRoute(anim.agentData);
    anim.targetPos = returnRoute.shift() || getDeskSeatPosition(anim.agentData) || anim.originalPos;
    anim.targetPos.y = ROOT_Y.standing;
    anim.routeTargets = returnRoute;
    anim.shouldSitDown = true;
    anim.thinkTime = 0;
  }
}

function sendAgentBackToDesk(agentId){
  const anim = agentAnimations[agentId];
  if(!anim) return;
  if(anim.thoughtBubble){
    removeThoughtBubble(anim.thoughtBubble);
    anim.thoughtBubble = null;
  }
  anim.state = ANIMATION_STATES.RETURNING;
  const returnRoute = buildDeskReturnRoute(anim.agentData);
  anim.targetPos = returnRoute.shift() || getDeskSeatPosition(anim.agentData) || anim.originalPos;
  anim.targetPos.y = ROOT_Y.standing;
  anim.routeTargets = returnRoute;
  anim.shouldSitDown = true;
  anim.thinkTime = 0;
  anim.workTime = 0;
}

// Agent A walks to Agent B's desk, shows speech bubble, B starts working
function startDelegationAnimation(fromId, toId, message){
  const fromAm = agentMeshes[fromId];
  const toAm = agentMeshes[toId];
  if(!fromAm || !toAm) return;
  // Skip if from-agent is already mid-animation
  const existing = agentAnimations[fromId];
  if(existing && existing.state !== ANIMATION_STATES.IDLE) return;

  const originalPos = fromAm.mesh.position.clone();
  const originalRot = fromAm.mesh.rotation.y;

  // Stand position: near target agent's desk, coming from from-agent's direction
  const toPos = toAm.desk ? toAm.desk.position.clone() : toAm.mesh.position.clone();
  const fromPos = fromAm.mesh.position.clone();
  const dir = new THREE.Vector3().subVectors(toPos, fromPos);
  dir.y = 0;
  if(dir.lengthSq() > 0.001) dir.normalize(); else dir.set(1, 0, 0);
  const standPos = toPos.clone().add(dir.multiplyScalar(-1.8));
  standPos.y = ROOT_Y.standing;

  agentAnimations[fromId] = {
    state: ANIMATION_STATES.STANDING_UP,
    originalPos: originalPos,
    originalRot: originalRot,
    startPos: originalPos.clone(),
    targetPos: standPos,
    agentData: fromAm,
    walkProgress: 0,
    walkSpeed: 3.5,
    thoughtBubble: null,
    workTime: 0,
    thinkTime: 0,
    standTime: 0,
    sitTime: 0,
    shouldSitDown: true,
    blockedTime: 0,
    detourTarget: null,
    isDelegation: true,
    delegationMsg: message || '',
    delegationTargetId: toId,
    delegationTriggered: false
  };
}

// Simple speech bubble sprite attached to agentMesh
function createSpeechBubble(text, agentMesh){
  if(!SHOW_OFFICE_DETAIL_BUBBLES) return null;
  const c = document.createElement('canvas');
  c.width = 512; c.height = 150;
  const ctx = c.getContext('2d');

  function rr(x, y, w, h, r){
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.arcTo(x+w, y, x+w, y+h, r);
    ctx.arcTo(x+w, y+h, x, y+h, r);
    ctx.arcTo(x, y+h, x, y, r);
    ctx.arcTo(x, y, x+w, y, r);
    ctx.closePath();
  }

  // Background
  ctx.fillStyle = 'rgba(10,12,30,0.94)';
  rr(4, 4, c.width-8, c.height-8, 14); ctx.fill();
  ctx.strokeStyle = '#7c5cfc'; ctx.lineWidth = 2.5;
  rr(4, 4, c.width-8, c.height-8, 14); ctx.stroke();

  // Header
  ctx.font = 'bold 16px Arial';
  ctx.fillStyle = '#c4b5fd';
  ctx.fillText('💬 Delegating:', 18, 32);

  // Word-wrapped body text
  ctx.font = '14px Arial';
  ctx.fillStyle = '#e2e2f0';
  const words = text.split(' ');
  let line = '', y = 58;
  for(const w of words){
    const test = line + w + ' ';
    if(ctx.measureText(test).width > c.width - 36 && line){
      ctx.fillText(line.trim(), 18, y);
      line = w + ' '; y += 22;
      if(y > 130) { ctx.fillText('…', 18, y); break; }
    } else { line = test; }
  }
  if(line && y <= 130) ctx.fillText(line.trim(), 18, y);

  const tex = new THREE.CanvasTexture(c);
  const mat = new THREE.SpriteMaterial({map: tex, transparent: true, depthTest: false});
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(3.2, 0.95, 1);
  // Attach to agentMesh so it follows the character
  sprite.position.set(1.2, 3.8, 0);
  sprite.renderOrder = 1001;
  agentMesh.add(sprite);
  thoughtBubbles.push(sprite);
  return sprite;
}

// Create rectangular thought bubble with agent info (dark theme)
function createThoughtBubble(agentData, agentMesh){
  if(!SHOW_OFFICE_DETAIL_BUBBLES) return null;
  // ===== DARK RECTANGULAR BUBBLE =====
  // Create canvas for bubble content
  const bubbleCanvas = document.createElement('canvas');
  bubbleCanvas.width = 512;
  bubbleCanvas.height = 384;
  const ctx = bubbleCanvas.getContext('2d');

  // Background - dark gradient
  const gradient = ctx.createLinearGradient(0, 0, 0, bubbleCanvas.height);
  gradient.addColorStop(0, '#1a1a2e');
  gradient.addColorStop(1, '#0f0f1a');
  ctx.fillStyle = gradient;
  roundRect(ctx, 5, 5, bubbleCanvas.width - 10, bubbleCanvas.height - 10, 12);
  ctx.fill();

  // Border
  ctx.strokeStyle = '#7c5cff';
  ctx.lineWidth = 3;
  roundRect(ctx, 5, 5, bubbleCanvas.width - 10, bubbleCanvas.height - 10, 12);
  ctx.stroke();

  // Agent name
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 20px Arial';
  ctx.fillText(esc(agentData.name || agentData.id), 20, 35);

  // Role
  ctx.fillStyle = '#a0a0b0';
  ctx.font = '14px Arial';
  ctx.fillText(esc(agentData.role || 'Agent'), 20, 60);

  // Status
  const statusColor = agentData.active ? '#00ff88' : '#ffaa00';
  const statusText = agentData.active ? '● Working' : '○ Idle';
  ctx.fillStyle = statusColor;
  ctx.font = '14px Arial';
  ctx.fillText(statusText, 20, 85);

  // Separator
  ctx.strokeStyle = '#3a3a4a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(20, 100);
  ctx.lineTo(bubbleCanvas.width - 20, 100);
  ctx.stroke();

  // Current task
  if(agentData.current_task){
    ctx.fillStyle = '#00ff88';
    ctx.font = '12px monospace';
    ctx.fillText('⚡ Task: ' + esc(agentData.current_task.substring(0, 40)), 20, 125);
  }

  // Current skill
  if(agentData.current_skill){
    ctx.fillStyle = '#ffd700';
    ctx.font = '12px monospace';
    ctx.fillText('⚙ Skill: ' + esc(agentData.current_skill.substring(0, 40)), 20, 145);
  }

  // Model
  if(agentData.model){
    ctx.fillStyle = '#888899';
    ctx.font = '11px Arial';
    ctx.fillText('Model: ' + esc(agentData.model), 20, 175);
  }

  // Session info
  if(agentData.session){
    ctx.fillStyle = agentData.active ? '#00ff88' : '#ffaa00';
    ctx.font = '11px Arial';
    ctx.fillText('🔗 Session Active', 20, 200);
  }

  // Skills section
  const skills = agentData.skills || [];
  if(skills.length > 0){
    ctx.fillStyle = '#4a6fa5';
    ctx.font = 'bold 12px Arial';
    ctx.fillText('Skills (' + skills.length + '):', 20, 230);

    ctx.fillStyle = '#a0a0b0';
    ctx.font = '11px Arial';
    let skillY = 255;
    skills.slice(0, 4).forEach((skill, i) => {
      ctx.fillText('• ' + esc(skill.name), 30, skillY);
      skillY += 18;
    });

    if(skills.length > 4){
      ctx.fillStyle = '#666677';
      ctx.fillText('... and ' + (skills.length - 4) + ' more', 30, skillY);
    }
  }

  // Close hint
  ctx.fillStyle = '#666677';
  ctx.font = '10px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('Click bubble to inspect', bubbleCanvas.width / 2, bubbleCanvas.height - 15);
  ctx.textAlign = 'left';

  // Helper function for rounded rectangle
  function roundRect(ctx, x, y, w, h, r) {
    if (w < 2 * r) r = w / 2;
    if (h < 2 * r) r = h / 2;
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // Create texture from canvas
  const bubbleTex = new THREE.CanvasTexture(bubbleCanvas);
  bubbleTex.needsUpdate = true;

  // Create plane for bubble (always faces camera)
  const bubbleGeo = new THREE.PlaneGeometry(3, 2.25);
  const bubbleMat = new THREE.MeshBasicMaterial({
    map: bubbleTex,
    transparent: true,
    side: THREE.DoubleSide,
    depthTest: false,
    depthWrite: false
  });
  const bubbleMesh = new THREE.Mesh(bubbleGeo, bubbleMat);

  // Initial position - will be updated by animation
  bubbleMesh.position.set(
    agentMesh.position.x,
    agentMesh.position.y + 2.8,
    agentMesh.position.z - 0.5
  );

  // Make bubble always face camera
  bubbleMesh.onBeforeRender = () => {
    bubbleMesh.lookAt(camera.position);
  };

  // Add to scene
  bubbleMesh.userData = {type: 'thoughtBubble', agentId: agentData.id};
  scene.add(bubbleMesh);

  // Store for tracking
  thoughtBubbles.push(bubbleMesh);

  // Return the mesh directly for animation
  return bubbleMesh;
}

// Animation loop with delta-time (frame-rate independent)
function animate(){
  requestAnimationFrame(animate);

  // Get delta time for consistent animation speed
  const delta = clock ? clock.getDelta() : 1/60;

  updateAgentStates(delta);
  updateSkyObjects(delta);
  updateAgentAnimations(delta); // Update walk/work/think animations
  updateThoughtPanel();
  updateAgentInfoLabelEffects(delta);
  updateAgentSleepLabelEffects(delta);
  updateTerminalScreens(delta); // Update terminal screen animations
  controls.update();
  renderer.render(scene, camera);
}

// Update animated sky objects (clouds, birds, sun)
function updateSkyObjects(delta){
  const time = clock ? clock.getElapsedTime() : 0;

  // Sun pulse (subtle glowing effect)
  if(sunMesh){
    const pulse = 1 + Math.sin(time * 0.5) * 0.05;
    sunMesh.scale.set(pulse, pulse, pulse);
  }

  // Animate clouds drifting
  clouds.forEach(cloud => {
    cloud.position.x += cloud.userData.speed * delta * 2;
    // Wrap around when too far
    if(cloud.position.x > 100){
      cloud.position.x = -100;
    }
    // Gentle bobbing
    cloud.position.y += Math.sin(time + cloud.userData.originalX) * 0.01;
  });

  // Animate birds flying
  birds.forEach(bird => {
    // Move forward in direction
    bird.position.add(bird.userData.direction.clone().multiplyScalar(bird.userData.speed * delta * 5));

    // Wing flapping
    bird.userData.flapPhase += bird.userData.flapSpeed * delta;
    const flapAngle = Math.sin(bird.userData.flapPhase) * 0.3;

    // Rotate wings
    bird.children[0].rotation.z = flapAngle;  // left wing
    bird.children[1].rotation.z = -flapAngle; // right wing

    // Reset bird position when it goes too far
    if(bird.position.x > 80 || bird.position.z < -80){
      bird.position.set(
        -60 - Math.random() * 20,
        20 + Math.random() * 15,
        -30 - Math.random() * 20
      );
    }
  });
}

}

async function loadOffice(){
  const container = document.getElementById('page-office');
  container.innerHTML = '<div class="loading">Loading 3D Office...</div>';

  try{
    const agents = await api('/api/agents');
    if(!agents || !Array.isArray(agents)){
      throw new Error('Invalid agents data');
    }
    officeAgents = agents;
    _cabinetAgents = agents;

    const active = agents.filter(a => a.active).length;
    document.getElementById('stats-bar').innerHTML = `
      <div class="stat-item"><span class="stat-number accent">${agents.length}</span><span class="stat-label">Agents</span></div>
      <div class="stat-item"><span class="stat-number green">${active}</span><span class="stat-label">Active</span></div>
      <div class="stat-item"><span class="stat-number orange">${agents.length-active}</span><span class="stat-label">Idle</span></div>`;

    // Initialize Three.js scene if not already done
    if(!scene){
      try{
        await initThreeJSOffice();
        syncOfficeAgentAnimations();
      }catch(err){
        console.error('Failed to init 3D office:', err);
        container.innerHTML = `<div class="empty">3D view error: ${err.message}<br><small>Check browser console for details</small></div>`;
        return;
      }
    } else {
      // Update existing scene with new agent data
      for(const agent of agents){
        if(agentMeshes[agent.id]){
          agentMeshes[agent.id].data = agent;
        }
      }
      syncOfficeAgentAnimations();
      updateAgentStates();
      updateHUD();
    }

    // Activity polling: richer task/event data every second for near-live office sync
    if(window._activityPoll) clearInterval(window._activityPoll);
    window._activityPoll = setInterval(async() => {
      const pg2 = document.getElementById('page-office');
      if(!pg2 || !pg2.classList.contains('active')) return;
      await pollActivity();
    }, 1000);
    setTimeout(pollActivity, 400); // initial poll shortly after scene loads

    // Auto-refresh: poll agent status more frequently so simultaneous activity stays visible
    if(window._officeRefresh) clearInterval(window._officeRefresh);
    window._officeRefresh = setInterval(async() => {
      const pg = document.getElementById('page-office');
      if(!pg || !pg.classList.contains('active')) return;

      try{
        const freshAgents = await api('/api/agents');
        if(!freshAgents || !Array.isArray(freshAgents)) return;

        officeAgents = freshAgents;
        _cabinetAgents = freshAgents;

        const freshActive = freshAgents.filter(a => a.active).length;
        document.getElementById('stats-bar').innerHTML = `
          <div class="stat-item"><span class="stat-number accent">${freshAgents.length}</span><span class="stat-label">Agents</span></div>
          <div class="stat-item"><span class="stat-number green">${freshActive}</span><span class="stat-label">Active</span></div>
          <div class="stat-item"><span class="stat-number orange">${freshAgents.length-freshActive}</span><span class="stat-label">Idle</span></div>`;

        // Update agent states in the 3D scene
        for(const agent of freshAgents){
          if(agentMeshes[agent.id]){
            agentMeshes[agent.id].data = agent;
          }
        }
        syncOfficeAgentAnimations();
        updateAgentStates();
        updateHUD();
      }catch(e){
        console.error('Office refresh error:', e);
      }
    }, 1500);

  }catch(e){
    console.error('Load office error:', e);
    container.innerHTML = `<div class="empty">Failed to load: ${e.message}</div>`;
  }
}

        }
      }
      let body=`<div style="font-size:11px;color:var(--text-dim);margin-bottom:10px">${allSkills.length} skills across ${agents.length} agents</div>`;
      body+='<div style="display:flex;flex-direction:column;gap:6px">';
      for(const {skill,agent} of allSkills){
        const idx=skill.content?addToStore((agent.name||agent.id)+' / '+skill.name+' (Skill)',skill.content):-1;
        body+=`<div class="list-card" style="padding:8px 14px;${idx>=0?'cursor:pointer':''}" ${idx>=0?`onclick="closeModal();setTimeout(()=>openFileModal(${idx}),200)"`:''}>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:14px">⚡</span>
            <div style="flex:1;min-width:0">
              <div style="font-size:12px;font-weight:600">${esc(skill.name)}</div>
              ${skill.triggers&&skill.triggers.length?`<div style="font-size:9px;color:var(--text-dim);margin-top:1px">${skill.triggers.slice(0,3).map(t=>esc(t)).join(' · ')}</div>`:''}
            </div>
            <span class="tag cyan" style="font-size:9px">${esc(agent.name||agent.id)}</span>
          </div>
        </div>`;
      }
      body+='</div>';
      openModal('📚 Skills Library',body);

    } else if(type==='files'){
      const agents=_cabinetAgents||await api('/api/agents');
      _cabinetAgents=agents;
      // Collect all files
      let body='<div style="display:flex;flex-direction:column;gap:6px">';
      for(const a of agents){
        const files=Object.keys(a.files||{});
        if(!files.length) continue;
        body+=`<div style="font-size:11px;font-weight:600;color:var(--accent);padding:8px 0 4px">${a.emoji||'🤖'} ${esc(a.name||a.id)}</div>`;
        for(const f of files){
          const idx=addToStore((a.name||a.id)+' / '+f, a.files[f]);
          body+=`<div class="list-card" style="padding:6px 12px;cursor:pointer" onclick="closeModal();setTimeout(()=>openFileModal(${idx}),200)">
            <span style="font-size:12px">${fileIcon(f)} ${esc(f)}</span>
            <span style="font-size:9px;color:var(--text-dim);float:right">${(a.files[f]||'').split('\\n').length} lines</span>
          </div>`;
        }
      }
      body+='</div>';
      openModal('🗄️ Files Cabinet',body);

    } else if(type==='logs'){
      // Fetch recent logs
      let body='<div style="font-size:11px;color:var(--text-dim);margin-bottom:10px">Recent system logs</div>';
      try{
        const sources=await api('/api/logs');
        body+='<div style="display:flex;flex-direction:column;gap:6px">';
        for(const s of sources){
          const st=s.stats||{};
          body+=`<div class="list-card" style="padding:10px 14px;cursor:pointer" onclick="closeModal();setTimeout(()=>openLogFromOffice('${s.id}'),200)">
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:16px">${s.icon}</span>
              <div style="flex:1;min-width:0">
                <div style="font-size:12px;font-weight:600">${esc(s.name)}</div>
                <div style="font-size:9px;color:var(--text-dim)">${esc(s.description)}</div>
              </div>
              <div style="text-align:right">
                ${st.exists&&st.lines?`<div style="font-size:10px;font-weight:600">${st.lines.toLocaleString()} lines</div>`:''}
                ${st.modified?`<div style="font-size:8px;color:var(--text-dim)">${st.modified}</div>`:''}
              </div>
            </div>
            ${s.preview?`<div class="detail-pre" style="margin-top:6px;max-height:60px;font-size:9px">${esc(s.preview)}</div>`:''}
          </div>`;
        }
        body+='</div>';
      }catch(e){
        body+='<div style="color:var(--red)">Could not load logs.</div>';
      }
      openModal('🖨️ Logs',body);
    }
  }catch(e){
    openModal('Error','<p>Could not load data.</p>');
  }
}

async function openLogFromOffice(logId){
  try{
    const d=await api('/api/logs/'+logId+'?lines=100');
    let body='';
    if(d.entries&&d.entries.length){
      body='<div style="max-height:70vh;overflow-y:auto">';
      for(const e of d.entries){
        const t=(e.time||'').replace('T',' ').slice(0,19),lv=e.level||'',m=e.message||e.raw||JSON.stringify(e);
        let lc='var(--text-dim)';if(lv==='ERROR')lc='var(--red)';else if(lv==='WARN')lc='var(--orange)';
        body+=`<div style="padding:2px 0;border-bottom:1px solid var(--border);font-size:10px;font-family:monospace"><span style="color:var(--text-dim)">${esc(t)}</span> <span style="color:${lc};font-weight:600">${esc(lv)}</span> <span style="color:var(--text)">${esc(typeof m==='string'?m:JSON.stringify(m))}</span></div>`;
      }
      body+='</div>';
    } else if(d.raw){
      body=`<pre>${esc(d.raw)}</pre>`;
    } else {
      body='<p>Empty.</p>';
    }
    openModal(d.name+' - Last 100',body);
  }catch(e){openModal('Error','<p>Could not load log.</p>');}
}

// ===== AGENT TEAM =====
let agentTeamConfig=null,agentTeamTasks=[],agentTeamPollTimer=null;
function ensureAgentTeamPolling(){
  if(agentTeamPollTimer) return;
  agentTeamPollTimer=setInterval(()=>{
    const pg=document.getElementById('page-agent-team');
    if(pg&&pg.classList.contains('active')) refreshAgentTeam();
  },5000);
}
async function loadAgentTeam(){
  loaded.agentTeam=true;
  ensureAgentTeamPolling();
  await refreshAgentTeam();
}
async function refreshAgentTeam(){
  try{
    const [cfg,tasks,ping]=await Promise.all([
      api('/api/agent-team/config'),
      api('/api/agent-team/tasks'),
      api('/api/agent-team/ping').catch(()=>({status:'offline'}))
    ]);
    agentTeamConfig=cfg||{};
    agentTeamTasks=Array.isArray(tasks)?tasks:[];
    const online=ping&&ping.status==='ok';
    const dot=document.getElementById('sb-agent-team');
    if(dot){dot.classList.remove('on','off');dot.classList.add(online?'on':'off');}
    renderAgentTeam(online);
  }catch(e){
    const dot=document.getElementById('sb-agent-team');
    if(dot){dot.classList.remove('on');dot.classList.add('off');}
    document.getElementById('page-agent-team').innerHTML='<div class="empty">Agent Team servisine ulaşılamadı.</div>';
  }
}
function renderAgentTeam(online){
  const total=agentTeamTasks.length;
  const queued=agentTeamTasks.filter(t=>t.status==='queued').length;
  const running=agentTeamTasks.filter(t=>t.status==='in_progress').length;
  const done=agentTeamTasks.filter(t=>t.status==='completed').length;
  const failed=agentTeamTasks.filter(t=>t.status==='failed').length;

  document.getElementById('stats-bar').innerHTML=`
    <div class="stat-item"><span class="stat-number accent">${total}</span><span class="stat-label">Tasks</span></div>
    <div class="stat-item"><span class="stat-number orange">${queued}</span><span class="stat-label">Queued</span></div>
    <div class="stat-item"><span class="stat-number blue">${running}</span><span class="stat-label">Running</span></div>
    <div class="stat-item"><span class="stat-number green">${done}</span><span class="stat-label">Done</span></div>
    <div class="stat-item"><span class="stat-number red">${failed}</span><span class="stat-label">Failed</span></div>`;

  let html=`<div class="column" style="margin-bottom:14px">
    <div class="column-header">
      <span class="column-dot ${online?'green':'red'}"></span>
      <span class="column-title">Agent Team Control</span>
      <span class="column-count">${online?'Online':'Offline'}</span>
    </div>
    <div class="detail-grid" style="margin-bottom:8px">
      <div class="detail-grid-item"><div class="detail-grid-label">Default Project</div><div class="detail-grid-value">${esc(agentTeamConfig.default_project_path||'-')}</div></div>
      <div class="detail-grid-item"><div class="detail-grid-label">Worker</div><div class="detail-grid-value">${agentTeamConfig.worker_running?'Running':'Stopped'}</div></div>
    </div>
    <div class="detail-grid" style="grid-template-columns:1fr 1fr">
      <div class="detail-grid-item"><div class="detail-grid-label">Goal</div><input id="at-goal" class="agent-input" placeholder="Örn: dashboard endpoint ekle"></div>
      <div class="detail-grid-item"><div class="detail-grid-label">Project Path</div><input id="at-project" class="agent-input" value="${esc(agentTeamConfig.default_project_path||'')}"></div>
      <div class="detail-grid-item"><div class="detail-grid-label">Implementation Command</div><input id="at-impl" class="agent-input" placeholder="örn: bash scripts/implement.sh"></div>
      <div class="detail-grid-item"><div class="detail-grid-label">Test Command</div><input id="at-test" class="agent-input" placeholder="örn: pytest -q"></div>
      <div class="detail-grid-item" style="grid-column:1/-1"><div class="detail-grid-label">Notify Endpoint (opsiyonel)</div><input id="at-notify" class="agent-input" placeholder="https://..."></div>
    </div>
    <div class="detail-actions">
      <button class="detail-btn primary" onclick="createAgentTeamTask()">+ Task</button>
      <button class="detail-btn" onclick="agentTeamWorker('start')">Start Worker</button>
      <button class="detail-btn" onclick="agentTeamWorker('stop')">Stop Worker</button>
      <button class="detail-btn" onclick="refreshAgentTeam()">↻ Refresh</button>
    </div>
  </div>`;

  html+='<div class="list-cards">';
  if(!agentTeamTasks.length){
    html+='<div class="empty" style="padding:24px">Henüz task yok.</div>';
  }else{
    for(const t of agentTeamTasks){
      const st=t.status||'unknown';
      const color=st==='completed'?'green':st==='failed'?'red':st==='in_progress'?'blue':'orange';
      html+=`<div class="list-card">
        <div class="list-card-header" onclick="toggleAgentTeamTask(${t.id})" style="cursor:pointer">
          <span class="list-card-icon">🧩</span>
          <div class="list-card-info">
            <div class="list-card-name">#${t.id} ${esc(t.goal||'')}</div>
            <div class="list-card-desc">${esc(t.project_path||'')}</div>
          </div>
          <div class="list-card-meta">
            <span class="tag ${color}">${esc(st)}</span>
            <span style="font-size:11px;color:var(--text-dim)">${esc((t.updated_at||'').replace('T',' ').slice(0,19))}</span>
          </div>
        </div>
        <div class="list-card-detail" id="agent-team-task-${t.id}">
          <div class="detail-grid">
            <div class="detail-grid-item"><div class="detail-grid-label">Implementation</div><div class="detail-grid-value">${esc(t.implementation_command||'-')}</div></div>
            <div class="detail-grid-item"><div class="detail-grid-label">Test</div><div class="detail-grid-value">${esc(t.test_command||'-')}</div></div>
          </div>
          ${t.logs?`<div class="detail-pre">${esc(t.logs)}</div>`:''}
          <div class="detail-actions">
            <button class="detail-btn" onclick="agentTeamRetry(${t.id})">Retry</button>
            <button class="detail-btn" onclick="agentTeamShowRaw(${t.id})">Raw</button>
          </div>
        </div>
      </div>`;
    }
  }
  html+='</div>';
  document.getElementById('page-agent-team').innerHTML=html;
}
function toggleAgentTeamTask(id){
  const el=document.getElementById('agent-team-task-'+id);
  if(el)el.classList.toggle('open');
}
async function createAgentTeamTask(){
  const goal=(document.getElementById('at-goal')||{}).value||'';
  const project_path=(document.getElementById('at-project')||{}).value||'';
  const implementation_command=(document.getElementById('at-impl')||{}).value||'';
  const test_command=(document.getElementById('at-test')||{}).value||'';
  const notify_endpoint=(document.getElementById('at-notify')||{}).value||'';
  try{
    const r=await fetch('/api/agent-team/tasks',{method:'POST',headers:{...headers,'Content-Type':'application/json'},body:JSON.stringify({goal,project_path,implementation_command,test_command,notify_endpoint})});
    const d=await r.json();
    if(!r.ok) throw new Error(d.error||'task create failed');
    refreshAgentTeam();
  }catch(e){
    openModal('Agent Team',`<p>Task oluşturulamadı: ${esc(e.message||'hata')}</p>`);
  }
}
async function agentTeamRetry(taskId){
  try{
    await fetch(`/api/agent-team/tasks/${taskId}/retry`,{method:'POST',headers});
    refreshAgentTeam();
  }catch(e){
    openModal('Agent Team','<p>Retry başarısız.</p>');
  }
}
async function agentTeamWorker(action){
  try{
    await fetch(`/api/agent-team/worker/${action}`,{method:'POST',headers});
    refreshAgentTeam();
  }catch(e){
    openModal('Agent Team','<p>Worker komutu başarısız.</p>');
  }
}
async function agentTeamShowRaw(taskId){
  try{
    const d=await api(`/api/agent-team/tasks/${taskId}`);
    openModal(`Agent Team Task #${taskId}`,`<pre>${esc(JSON.stringify(d,null,2))}</pre>`);
  }catch(e){
    openModal('Agent Team','<p>Task detayı alınamadı.</p>');
  }
}
