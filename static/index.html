// ===== LOGS =====
let logSourcesData=[],activeLogFilter='all';
function formatBytes(b){if(!b)return'0 B';const k=1024,s=['B','KB','MB','GB'],i=Math.floor(Math.log(b)/Math.log(k));return parseFloat((b/Math.pow(k,i)).toFixed(1))+' '+s[i];}
async function loadLogs(){
  loaded.logs=true;
  try{logSourcesData=await api('/api/logs');document.getElementById('stats-bar').innerHTML=`<div class="stat-item"><span class="stat-number accent">${logSourcesData.length}</span><span class="stat-label">Sources</span></div>`;renderLogs();}
  catch(e){document.getElementById('page-logs').innerHTML='<div class="empty">Yüklenemedi.</div>';}
}
function renderLogs(){
  const sources=activeLogFilter==='all'?logSourcesData:logSourcesData.filter(s=>s.category===activeLogFilter);
  const cats=[...new Set(logSourcesData.map(s=>s.category))];
  let html=`<div class="logs-toolbar">
    <input type="text" class="search-box" style="width:auto;flex:1" id="log-search-input" placeholder="Loglarda ara..." onkeydown="if(event.key==='Enter')searchAllLogs()">
    <button class="detail-btn primary" onclick="searchAllLogs()">Ara</button>
    <button class="logs-filter-btn ${activeLogFilter==='all'?'active':''}" onclick="filterLogs('all')">Tümü</button>`;
  for(const c of cats)html+=`<button class="logs-filter-btn ${activeLogFilter===c?'active':''}" onclick="filterLogs('${c}')">${c}</button>`;
  html+='</div><div id="log-search-results"></div><div class="list-cards">';
  for(const s of sources){
    const st=s.stats||{};
    html+=`<div class="list-card" id="log-card-${s.id}">
      <div class="list-card-header" onclick="toggleLog('${s.id}')" style="cursor:pointer">
        <span class="list-card-icon">${s.icon}</span>
        <div class="list-card-info"><div class="list-card-name">${esc(s.name)}</div><div class="list-card-desc">${esc(s.description)}</div></div>
        <div class="list-card-meta">
          <span class="tag ${s.category==='core'?'purple':s.category==='cron'?'orange':s.category==='service'?'green':'cyan'}">${s.category}</span>
          ${st.exists&&st.size>0?`<div class="list-card-stat"><div class="list-card-stat-label">Size</div><div class="list-card-stat-value">${formatBytes(st.size)}</div></div><div class="list-card-stat"><div class="list-card-stat-label">Lines</div><div class="list-card-stat-value">${st.lines.toLocaleString()}</div></div>`:''}
        </div>
      </div>
      <div class="list-card-detail" id="log-detail-${s.id}">
        <div id="log-content-${s.id}">${s.preview?`<div class="detail-pre">${colorize(esc(s.preview))}</div>`:'<div style="color:var(--text-dim);font-size:11px">Boş.</div>'}</div>
        <div class="detail-actions">
          <button class="detail-btn primary" onclick="viewLogDetail('${s.id}',100)">Son 100</button>
          <button class="detail-btn" onclick="viewLogDetail('${s.id}',500)">Son 500</button>
          <button class="detail-btn" onclick="refreshLogSrc('${s.id}')">↻ Yenile</button>
          ${s.all_files&&s.all_files.length>1?`<select class="search-box" style="width:170px;padding:5px 8px" onchange="viewLogDate('${s.id}',this.value)">${s.all_files.map(f=>`<option value="${esc(f)}">${esc(f.split('/').pop())}</option>`).join('')}</select>`:''}
        </div>
      </div>
    </div>`;
  }
  html+='</div>';
  document.getElementById('page-logs').innerHTML=html;
}
function colorize(t){return t.split('\n').map(l=>{let c='';const w=l.toLowerCase();if(w.includes('error')||w.includes('fail'))c='error';else if(w.includes('warn'))c='WARN';else if(w.includes('info'))c='INFO';return`<div class="log-line ${c}">${l}</div>`;}).join('');}
function filterLogs(c){activeLogFilter=c;renderLogs();}
function toggleLog(id){const el=document.getElementById('log-detail-'+id);if(el)el.classList.toggle('open');}

async function searchAllLogs(){const q=(document.getElementById('log-search-input')||{}).value||'';if(!q||q.length<2)return;const rd=document.getElementById('log-search-results');rd.innerHTML='<div class="loading" style="padding:16px">Aranıyor...</div>';try{const d=await api('/api/logs/search?q='+encodeURIComponent(q));if(!d.results||!d.results.length){rd.innerHTML=`<div style="padding:12px;color:var(--text-dim)">"${esc(q)}" bulunamadı.</div>`;return;}let h=`<div style="font-size:12px;color:var(--text-dim);margin-bottom:8px">${d.total_sources} kaynakta sonuç</div><div class="search-results">`;for(const r of d.results)h+=`<div class="search-result-card"><div class="search-result-header"><span>${r.icon}</span><span style="font-weight:600">${esc(r.source_name)}</span><span class="search-result-count">${r.match_count}</span></div><div class="detail-pre" style="max-height:120px">${hlSearch(esc(r.matches),q)}</div></div>`;h+='</div>';rd.innerHTML=h;}catch(e){rd.innerHTML='<div style="color:var(--red);padding:12px">Hata.</div>';}}

async function checkPcApi(){
  try{

    const el=document.getElementById('pc-api-status');
    if(d.online){
      el.textContent='Online';el.className='sys-value online';

// ===== REAL-TIME ACTIVITY POLLING =====
let _seenEventIds = new Set();

async function pollActivity(){
  if(!scene) return; // 3D not initialized yet
  try{
    const data = await api('/api/activity');

    // Update per-agent current tasks
    for(const [agentId, info] of Object.entries(data.agents || {})){
      const am = agentMeshes[agentId];
      if(!am) continue;
      let changed = false;
      if(info.current_task !== undefined && info.current_task !== am.data.current_task){
        am.data.current_task = info.current_task;
        changed = true;
      }
      if(info.current_skill !== undefined && info.current_skill !== am.data.current_skill){
        am.data.current_skill = info.current_skill;
        changed = true;
      }
      if(changed){
        am._labelKey = '';
        refreshAgentInfoLabel(am);
      }
    }
    syncOfficeAgentAnimations();

    // Process new events (deduplicated by ID)
    for(const evt of (data.events || [])){
      const evtId = evt.id || ((evt.ts || '') + ':' + String(evt.msg || '').slice(0, 30));
      if(_seenEventIds.has(evtId)) continue;
      _seenEventIds.add(evtId);

      // Trigger delegation walk animation for agent-to-agent calls
      if(evt.type === 'agent_call' && evt.from && evt.to && evt.from !== evt.to){
        if(agentMeshes[evt.from] && agentMeshes[evt.to]){
          startDelegationAnimation(evt.from, evt.to, evt.msg || 'Task delegated');
        }
      }
      addActivityFeedItem(evt);
    }

    // Keep seen IDs bounded
    if(_seenEventIds.size > 300){
      _seenEventIds = new Set([..._seenEventIds].slice(-150));
    }
  }catch(e){
    // Silently ignore - don't spam console during normal offline periods
  }
}

function addActivityFeedItem(evt){
  const feed = document.getElementById('activity-feed');
  if(!feed) return;

  const icons = {agent_call: '🔀', task_start: '▶', task_done: '✅'};
  const icon = icons[evt.type] || '•';
  const fromTo = (evt.from && evt.to) ? `<b>${evt.from}</b> → <b>${evt.to}</b>: ` : '';
  const msg = String(evt.msg || '').slice(0, 65);

  const div = document.createElement('div');
  div.className = 'af-item af-new';
  div.innerHTML = `<span class="af-icon">${icon}</span><span>${fromTo}${msg}</span>`;
  feed.insertBefore(div, feed.firstChild);

  // Remove highlight after 3s
  setTimeout(() => div.classList.remove('af-new'), 3000);

  // Keep only last 6 items
  while(feed.children.length > 6) feed.removeChild(feed.lastChild);
}

const PREDEFINED_TAGS=['kodlama','yazı','tasarım','analiz','otomasyon','araştırma','verimlilik','iş','ses','görüntü'];
let activeTagFilter='all';
let toolsTimer=null;

function dbadge(d,ev){
  if(ev)return'<span class="dbadge d-eval">⏳ değerlendiriliyor</span>';
  if(!d)return'<span class="dbadge d-none">değerlendirilmedi</span>';
  const m={ADOPT:'d-adopt ✅',WAIT:'d-wait ⏳',IGNORE:'d-ignore ❌'};
  const[cls,ico]=(m[d]||'d-none ').split(' ');
  return`<span class="dbadge ${cls}">${ico||''} ${d}</span>`;
}
function fmtD(s){if(!s)return'—';try{return new Date(s).toLocaleString('tr-TR',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}catch{return s.slice(0,16);}}

async function loadTools(){
  clearTimeout(toolsTimer);
  const pg=document.getElementById('page-tools');
  if(!pg)return;
  try{
    const tools=await api('/api/tools');
    renderTools(tools);
    if(tools.some(t=>t.evaluating))toolsTimer=setTimeout(loadTools,10000);
  }catch(e){pg.innerHTML='<div class="empty-hint">Tools yüklenemedi.</div>';}
}

function renderTools(tools){
  const pg=document.getElementById('page-tools');
  const allTags=new Set();
  tools.forEach(t=>(t.tags||[]).forEach(tag=>allTags.add(tag)));
  const filtered=activeTagFilter==='all'?tools:tools.filter(t=>(t.tags||[]).includes(activeTagFilter));
  let h='<div class="tools-wrap">';
  // Üst bar
  h+=`<div class="tools-topbar">
    <div><span class="tools-title">AI Tool Takip</span><span class="tools-count">${tools.length} tool</span></div>
    <div class="add-row">
      <input class="t-input wide" id="ti-name" placeholder="Tool adı (ör: Cursor AI)" />
      <input class="t-input med" id="ti-tags" placeholder="etiketler (virgülle)" />
      <button class="btn-p" onclick="addTool()">+ Ekle</button>
      <button class="btn-s" onclick="loadTools()">↻</button>
    </div>
  </div>`;
  // Filtre bar
  if(allTags.size>0){
    h+='<div class="tag-filter-bar"><span style="font-size:11px;color:var(--text-secondary);">Filtre:</span>';
    h+=`<span class="tf-chip${activeTagFilter==='all'?' act':''}" onclick="setTF('all')">Tümü</span>`;
    [...allTags].sort().forEach(tag=>{
      const cnt=tools.filter(t=>(t.tags||[]).includes(tag)).length;
      h+=`<span class="tf-chip${activeTagFilter===tag?' act':''}" onclick="setTF(${JSON.stringify(tag)})">${esc(tag)} (${cnt})</span>`;
    });
    h+='</div>';
  }
  h+='<datalist id="ptags">'+PREDEFINED_TAGS.map(t=>`<option value="${t}">`).join('')+'</datalist>';
  if(filtered.length===0){
    h+='<div class="empty-hint">Bu etikette tool yok.</div>';
  }else{
    filtered.forEach(t=>{
      h+=`<div class="tool-card">
        <div class="tc-head">
          <span class="tc-name">🛠️ ${esc(t.name)}</span>
          ${dbadge(t.decision,t.evaluating)}
          <div class="tc-actions">
            <button class="btn-s" onclick="evalTool(${JSON.stringify(t.name)})" ${t.evaluating?'disabled':''}>${t.evaluating?'⏳':'🔍 Değerlendir'}</button>
            ${t.has_report?`<button class="btn-s" onclick="showRep(${JSON.stringify(t.name)})">📄 Rapor</button>`:''}
            <button class="btn-s btn-del" onclick="delTool(${JSON.stringify(t.name)})">🗑</button>
          </div>
        </div>
        <div class="tc-meta">Son: ${fmtD(t.last_eval)}${t.added?' · Eklendi: '+fmtD(t.added):''}</div>
        <div class="tc-tags">${(t.tags||[]).map(tag=>`<span class="tag-chip">${esc(tag)}<span class="tag-x" onclick="rmTag(${JSON.stringify(t.name)},${JSON.stringify(tag)})">&times;</span></span>`).join('')}
          <button class="tag-add" onclick="addTagUI(${JSON.stringify(t.name)},this)" list="ptags">+ etiket</button>
        </div>
        ${t.report_preview&&!t.evaluating?`<div class="tc-preview">${esc(t.report_preview.replace(/<[^>]+>/g,' ').trim().slice(0,130))}…</div>`:''}
      </div>`;
    });
  }
  h+='</div>';
  pg.innerHTML=h;
  const ni=document.getElementById('ti-name');
  if(ni)ni.addEventListener('keydown',e=>{if(e.key==='Enter')addTool();});
}

function setTF(tag){activeTagFilter=tag;loadTools();}

async function addTool(){
  const ni=document.getElementById('ti-name'),ti=document.getElementById('ti-tags');
  const name=(ni?.value||'').trim();
  if(!name)return;
  const tags=(ti?.value||'').split(',').map(t=>t.trim().toLowerCase()).filter(Boolean);
  await fetch('/api/tools',{method:'POST',headers:{...headers,'Content-Type':'application/json'},body:JSON.stringify({name,tags})});
  if(ni)ni.value='';if(ti)ti.value='';
  await loadTools();
}

async function delTool(name){
  if(!confirm(name+' silinsin mi?'))return;
  await fetch('/api/tools/'+encodeURIComponent(name),{method:'DELETE',headers});
  await loadTools();
}

async function evalTool(name){
  await fetch('/api/tools/'+encodeURIComponent(name)+'/evaluate',{method:'POST',headers});
  await loadTools();
}

async function showRep(name){
  const r=await fetch('/api/tools/'+encodeURIComponent(name),{headers});
  const t=await r.json();
  if(!t.report){openModal(name,'<p>Rapor yok.</p>');return;}
  openModal(name+' — Rapor',`<div style="font-size:13px;line-height:1.7;max-height:70vh;overflow-y:auto;">${t.report}</div>`);
}

async function rmTag(name,tag){
  const r=await fetch('/api/tools/'+encodeURIComponent(name),{headers});
  const t=await r.json();
  const tags=(t.tags||[]).filter(x=>x!==tag);
  await fetch('/api/tools/'+encodeURIComponent(name),{method:'PATCH',headers:{...headers,'Content-Type':'application/json'},body:JSON.stringify({tags})});
  await loadTools();
}

function addTagUI(name,btn){
  const row=btn.parentElement;
  if(row.querySelector('.tag-inp'))return;
  const inp=document.createElement('input');
  inp.className='tag-inp';inp.placeholder='etiket…';inp.setAttribute('list','ptags');
  row.insertBefore(inp,btn);inp.focus();
  const commit=async()=>{
    const v=inp.value.trim().toLowerCase();
    if(v){
      const r=await fetch('/api/tools/'+encodeURIComponent(name),{headers});
      const t=await r.json();
      const tags=t.tags||[];
      if(!tags.includes(v)){
        await fetch('/api/tools/'+encodeURIComponent(name),{method:'PATCH',headers:{...headers,'Content-Type':'application/json'},body:JSON.stringify({tags:[...tags,v]})});
        await loadTools();return;
      }
    }
    inp.remove();
  };
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')commit();if(e.key==='Escape')inp.remove();});
  inp.addEventListener('blur',()=>setTimeout(commit,150));
}

const FMTS=['thread','liste','egitim','storytelling','karsilastirma','hot-take','spark','ozet'];
const FLBL={'thread':'🧵 Thread','liste':'📋 Liste','egitim':'📚 Eğitim','storytelling':'📖 Hikaye',
  'karsilastirma':'⚔️ Karşılaştırma','hot-take':'🔥 Hot-Take','spark':'💡 Spark','ozet':'📝 Özet'};
const STYS=['grok','profesyonel','samimi','hoca','merakli'];
const SLBL={'grok':'😈 Grok','profesyonel':'💼 Pro','samimi':'😊 Samimi','hoca':'👨‍🏫 Hoca','merakli':'🔍 Meraklı'};
let selFmt='thread',selSty='samimi',studioTimer=null;

async function loadStudio(){
  clearTimeout(studioTimer);
  const pg=document.getElementById('page-studio');if(!pg)return;
  let hist=[];
  try{hist=await api('/api/studio/history');}catch(e){}
  renderStudio(hist);
  if(hist.some(h=>h.generating))studioTimer=setTimeout(loadStudio,8000);
}

function renderStudio(hist){
  const pg=document.getElementById('page-studio');
  const fmtBtns=FMTS.map(f=>`<button class="fmt-btn${f===selFmt?' sel':''}" onclick="pickFmt('${f}')">${FLBL[f]}</button>`).join('');
  const styBtns=STYS.map(s=>`<button class="sty-btn${s===selSty?' sel':''}" onclick="pickSty('${s}')">${SLBL[s]}</button>`).join('');
  let histH='';
  if(!hist.length){histH='<div class="empty-hint">Henüz içerik üretilmedi.</div>';}
  else hist.forEach(h=>{
    const prev=h.preview?(h.preview.replace(/<[^>]*>/g,' ').trim().slice(0,140)):'';
    histH+=`<div class="hist-item">
      <div class="hi-head">
        <span class="hi-topic">${esc(h.topic)}</span>
        <span class="hi-badge">${esc(h.format)}</span>
        <span class="hi-badge">${esc(h.style)}</span>
        ${h.generating?'<span class="hi-badge hi-gen">⏳ üretiliyor</span>':''}
      </div>
      <div class="hi-meta">${fmtD(h.created_at)}${h.sent?' · Telegram\'a gönderildi':''}</div>
      ${prev?`<div class="hi-preview">${esc(prev)}</div>`:''}
      <div class="hi-actions">
        ${!h.generating&&h.preview?`<button class="btn-s" onclick="viewHist('${h.id}')">👁 Görüntüle</button>`:''}
        <button class="btn-s" onclick="reGen('${esc(h.topic)}','${h.format}','${h.style}')">↺ Tekrar</button>
      </div>
    </div>`;
  });
  pg.innerHTML=`<div class="studio-wrap"><div class="studio-grid">
    <div class="s-panel">
      <div class="s-panel-title">✍️ İçerik Üret</div>
      <div class="s-label">Konu</div>
      <input class="t-input s-full" id="st-topic" placeholder="ör: ChatGPT vs Claude AI" />
      <div class="s-label">Format</div>
      <div class="fmt-grid">${fmtBtns}</div>
      <div class="s-label">Stil</div>
      <div class="sty-grid">${styBtns}</div>
      <div class="s-btn-row">
        <button class="s-btn s-btn-main" onclick="stGen(false)">🚀 Üret</button>
        <button class="s-btn s-btn-all" onclick="stGen(true)">📦 Tüm Formatlar</button>
      </div>
      <div class="s-hint">Seçili: <b>${FLBL[selFmt]}</b> / <b>${SLBL[selSty]}</b><br>İçerik Telegram'a da gönderilir.</div>
    </div>
    <div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <span class="s-panel-title">📋 Geçmiş</span>
        <button class="btn-s" onclick="loadStudio()">↻ Yenile</button>
      </div>
      ${histH}
    </div>
  </div></div>`;
  const inp=document.getElementById('st-topic');
  if(inp)inp.addEventListener('keydown',e=>{if(e.key==='Enter')stGen(false);});
}

function pickFmt(f){selFmt=f;if(document.getElementById('page-studio'))loadStudio();}
function pickSty(s){selSty=s;if(document.getElementById('page-studio'))loadStudio();}

async function stGen(allFmts){
  const inp=document.getElementById('st-topic');
  const topic=(inp?.value||'').trim();
  if(!topic){alert('Konu girin!');return;}
  await fetch('/api/studio/generate',{method:'POST',headers:{...headers,'Content-Type':'application/json'},
    body:JSON.stringify({topic,format:selFmt,style:selSty,all_formats:allFmts})});
  if(inp)inp.value='';
  await loadStudio();
}

async function viewHist(id){
  const r=await fetch('/api/studio/history/'+id,{headers});
  const it=await r.json();
  const content=it.content||'(içerik yok)';
  const display=content.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<b>$1</b>');
  openModal(`${it.topic} — ${it.format}/${it.style}`,
    `<div style="font-size:13px;line-height:1.8;max-height:70vh;overflow-y:auto;">${display}</div>`);
}

function reGen(topic,fmt,sty){
  const inp=document.getElementById('st-topic');
  if(inp)inp.value=topic;
  selFmt=FMTS.includes(fmt)?fmt:'thread';
  selSty=STYS.includes(sty)?sty:'samimi';
  stGen(fmt==='all');
}

loadAgents();
api('/api/status').then(s=>{
  document.getElementById('sb-browser').classList.add(s.browser_agent==='online'?'on':'off');
  document.getElementById('sb-pc').classList.add(s.pc==='online'?'on':'off');

}).catch(()=>{document.getElementById('sb-browser').classList.add('off');document.getElementById('sb-pc').classList.add('off');document.getElementById('sb-agent-team').classList.add('off');});
</script>
